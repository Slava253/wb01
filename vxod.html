<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Вход | Маркетплейс</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f3b5f, #1b5a7a);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        .auth-container {
            max-width: 420px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
        .auth-container .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-container .logo h1 {
            font-size: 1.8rem;
            color: #0f3b5f;
        }
        .auth-container .logo h1 i { color: #ffcd3c; }
        .auth-container .logo p {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 4px;
        }
        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .role-btn {
            padding: 14px 10px;
            border-radius: 16px;
            border: 2px solid #e2e8f0;
            background: white;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
            font-family: inherit;
        }
        .role-btn:hover { border-color: #94a3b8; }
        .role-btn.active {
            border-color: #0f3b5f;
            background: #f0f4ff;
        }
        .role-btn .icon { font-size: 1.8rem; display: block; margin-bottom: 4px; }
        .role-btn .label { font-weight: 600; font-size: 0.85rem; }
        .role-btn .desc { font-size: 0.7rem; color: #94a3b8; }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 4px;
            color: #1e293b;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
            font-family: inherit;
            transition: 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #0f3b5f;
            box-shadow: 0 0 0 3px rgba(15,59,95,0.1);
        }
        .hidden { display: none !important; }
        .auth-divider {
            text-align: center;
            padding: 12px 0;
            color: #94a3b8;
            font-size: 0.85rem;
        }
        .auth-switch {
            text-align: center;
            margin-top: 12px;
            font-size: 0.85rem;
            color: #64748b;
        }
        .auth-switch a { color: #0f3b5f; font-weight: 600; cursor: pointer; }
        .auth-switch a:hover { text-decoration: underline; }
        @media (max-width: 480px) {
            .auth-container { padding: 24px 20px; }
            .role-selector { grid-template-columns: 1fr 1fr; gap: 6px; }
            .role-btn { padding: 10px 6px; }
            .role-btn .icon { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="auth-container" id="app">
    <div class="logo">
        <h1><i class="fas fa-store"></i> Маркетплейс</h1>
        <p>Войдите в свой аккаунт</p>
    </div>

    <div class="role-selector" id="roleSelector">
        <button class="role-btn active" data-role="client"><span class="icon">🛒</span><span class="label">Клиент</span><span class="desc">Покупать</span></button>
        <button class="role-btn" data-role="seller"><span class="icon">🏷️</span><span class="label">Продавец</span><span class="desc">Продавать</span></button>
        <button class="role-btn" data-role="pvz"><span class="icon">📦</span><span class="label">ПВЗ</span><span class="desc">Выдавать</span></button>
        <button class="role-btn" data-role="admin"><span class="icon">👑</span><span class="label">Админ</span><span class="desc">Управление</span></button>
    </div>

    <div id="loginForm">
        <div class="form-group">
            <label id="loginLabel">📧 Email</label>
            <input type="email" id="loginEmail" placeholder="email@example.com">
        </div>
        <div class="form-group" id="loginPasswordGroup">
            <label>🔑 Пароль</label>
            <input type="password" id="loginPassword" placeholder="Введите пароль">
        </div>
        <div class="form-group hidden" id="adminLoginGroup">
            <label>👑 Логин администратора</label>
            <input type="text" id="adminLogin" value="2347">
        </div>
        <div class="form-group hidden" id="adminPasswordGroup">
            <label>🔑 Пароль администратора</label>
            <input type="password" id="adminPassword" value="2203">
        </div>
        <div class="form-group hidden" id="pvzLoginGroup">
            <label>🏢 Логин ПВЗ</label>
            <input type="text" id="pvzLogin" placeholder="Логин ПВЗ">
        </div>
        <div class="form-group hidden" id="pvzPasswordGroup">
            <label>🔑 Пароль ПВЗ</label>
            <input type="password" id="pvzPassword" placeholder="Пароль ПВЗ">
        </div>
        <button class="btn btn-primary" id="loginBtn" style="width:100%;padding:14px;border-radius:12px;font-size:1rem;">🔐 Войти</button>
    </div>

    <div class="auth-divider"><span>или</span></div>

    <div id="registerForm">
        <div class="form-group"><label>📧 Email</label><input type="email" id="regEmail" placeholder="email@example.com"></div>
        <div class="form-group"><label>🔑 Пароль</label><input type="password" id="regPassword" placeholder="Придумайте пароль"></div>
        <div class="form-group"><label>👤 Имя / Название</label><input type="text" id="regName" placeholder="Ваше имя или название магазина"></div>
        <button class="btn btn-success" id="registerBtn" style="width:100%;padding:14px;border-radius:12px;font-size:1rem;">📝 Зарегистрироваться</button>
    </div>

    <div class="auth-switch">
        <span id="switchText">Нет аккаунта?</span>
        <a id="switchLink">Зарегистрироваться</a>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    }
}
</script>

<script type="module">
import { initializeApp } from "firebase/app";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "firebase/auth";
import { getDatabase, ref, set, get } from "firebase/database";
import { firebaseConfig } from "./js/firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentRole = 'client';
let isLoginMode = true;

function showNotif(text, isError = false) {
    const el = document.getElementById('notif') || (() => {
        const d = document.createElement('div');
        d.id = 'notif';
        d.className = 'notification';
        document.body.appendChild(d);
        return d;
    })();
    el.textContent = text;
    el.className = 'notification show ' + (isError ? 'error' : 'success');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

function redirectToRole(role) {
    const pages = { 'client': 'client.html', 'seller': 'seller.html', 'pvz': 'pvz.html', 'admin': 'admin.html' };
    const page = pages[role];
    if (page) { localStorage.setItem('userRole', role); window.location.href = page; }
}

function updateForm() {
    document.getElementById('loginPasswordGroup').classList.remove('hidden');
    document.getElementById('adminLoginGroup').classList.add('hidden');
    document.getElementById('adminPasswordGroup').classList.add('hidden');
    document.getElementById('pvzLoginGroup').classList.add('hidden');
    document.getElementById('pvzPasswordGroup').classList.add('hidden');
    const label = document.getElementById('loginLabel');
    const emailInput = document.getElementById('loginEmail');
    if (currentRole === 'admin') {
        document.getElementById('adminLoginGroup').classList.remove('hidden');
        document.getElementById('adminPasswordGroup').classList.remove('hidden');
        document.getElementById('loginPasswordGroup').classList.add('hidden');
        label.textContent = '👑 Логин администратора';
        emailInput.placeholder = 'Введите логин';
        emailInput.value = '2347';
    } else if (currentRole === 'pvz') {
        document.getElementById('pvzLoginGroup').classList.remove('hidden');
        document.getElementById('pvzPasswordGroup').classList.remove('hidden');
        document.getElementById('loginPasswordGroup').classList.add('hidden');
        label.textContent = '🏢 Логин ПВЗ';
        emailInput.placeholder = 'Введите логин ПВЗ';
        emailInput.value = '';
    } else {
        label.textContent = '📧 Email';
        emailInput.placeholder = 'email@example.com';
        emailInput.value = '';
    }
}

document.querySelectorAll('.role-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentRole = this.dataset.role;
        updateForm();
    });
});

document.getElementById('switchLink').addEventListener('click', function() {
    isLoginMode = !isLoginMode;
    document.getElementById('loginForm').style.display = isLoginMode ? 'block' : 'none';
    document.getElementById('registerForm').style.display = isLoginMode ? 'none' : 'block';
    document.querySelector('.auth-divider').style.display = isLoginMode ? 'block' : 'none';
    this.textContent = isLoginMode ? 'Зарегистрироваться' : 'Войти';
    document.getElementById('switchText').textContent = isLoginMode ? 'Нет аккаунта?' : 'Уже есть аккаунт?';
});

document.getElementById('loginBtn').addEventListener('click', async function() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const adminLogin = document.getElementById('adminLogin').value.trim();
    const adminPass = document.getElementById('adminPassword').value.trim();
    const pvzLogin = document.getElementById('pvzLogin').value.trim();
    const pvzPass = document.getElementById('pvzPassword').value.trim();

    try {
        if (currentRole === 'admin') {
            if (adminLogin === '2347' && adminPass === '2203') {
                try { await signInWithEmailAndPassword(auth, 'admin@market.com', 'admin123'); } catch(e) {
                    const cred = await createUserWithEmailAndPassword(auth, 'admin@market.com', 'admin123');
                    await set(ref(db, 'users/' + cred.user.uid), { role: 'admin', name: 'Администратор' });
                }
                showNotif('✅ Добро пожаловать, Администратор!');
                redirectToRole('admin');
            } else { showNotif('❌ Неверный логин или пароль!', true); }
            return;
        }

        if (currentRole === 'pvz') {
            const snap = await get(ref(db, 'pvz'));
            let found = false;
            if (snap.exists()) {
                const data = snap.val();
                for (const key in data) {
                    if (data[key].login === pvzLogin && data[key].password === pvzPass) {
                        found = true;
                        try { await signInWithEmailAndPassword(auth, 'pvz_' + pvzLogin + '@market.com', pvzPass); } catch(e) {
                            const cred = await createUserWithEmailAndPassword(auth, 'pvz_' + pvzLogin + '@market.com', pvzPass);
                            await set(ref(db, 'users/' + cred.user.uid), { role: 'pvz', name: 'ПВЗ ' + pvzLogin });
                        }
                        showNotif('✅ Добро пожаловать в ПВЗ!');
                        redirectToRole('pvz');
                        break;
                    }
                }
            }
            if (!found) { showNotif('❌ Неверный логин или пароль ПВЗ!', true); }
            return;
        }

        if (!email || !password) { showNotif('❌ Заполните все поля!', true); return; }
        await signInWithEmailAndPassword(auth, email, password);
        showNotif('✅ Добро пожаловать!');
        redirectToRole(currentRole);
    } catch(e) { showNotif('❌ ' + e.message, true); }
});

document.getElementById('registerBtn').addEventListener('click', async function() {
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value.trim();
    const name = document.getElementById('regName').value.trim() || 'Пользователь';
    if (!email || !password) { showNotif('❌ Заполните все поля!', true); return; }
    try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await set(ref(db, 'users/' + cred.user.uid), { role: currentRole, name: name });
        showNotif('✅ Регистрация успешна!');
        redirectToRole(currentRole);
    } catch(e) { showNotif('❌ ' + e.message, true); }
});

updateForm();
document.getElementById('registerForm').style.display = 'none';

onAuthStateChanged(auth, async (user) => {
    if (user) {
        const snap = await get(ref(db, 'users/' + user.uid));
        if (snap.exists()) {
            const role = snap.val().role;
            const currentPage = window.location.pathname.split('/').pop();
            const pages = { 'client': 'client.html', 'seller': 'seller.html', 'pvz': 'pvz.html', 'admin': 'admin.html' };
            const targetPage = pages[role];
            if (targetPage && currentPage !== targetPage && currentPage !== 'vxod.html') {
                window.location.href = targetPage;
            }
        }
    }
});
</script>
</body>
</html>
