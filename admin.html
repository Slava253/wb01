<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ панель</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-crown"></i> Админ панель</h1>
        <div class="header-right">
            <span class="user-badge" id="userBadge">👤 Админ</span>
            <button class="btn btn-outline" id="logoutBtn">Выйти</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="dashboard">📊 Дашборд</button>
        <button class="tab-btn" data-tab="pvz">🏢 ПВЗ</button>
        <button class="tab-btn" data-tab="products">📦 Товары</button>
        <button class="tab-btn" data-tab="orders">📋 Заказы</button>
    </div>

    <!-- Дашборд -->
    <div class="tab-content active" id="tab-dashboard">
        <div class="dashboard-stats" id="dashboardStats"></div>
    </div>

    <!-- ПВЗ -->
    <div class="tab-content" id="tab-pvz">
        <div style="background:#f8fafc;padding:16px;border-radius:12px;border:1px solid #e2e8f0;margin-bottom:16px;">
            <h4>➕ Создать ПВЗ</h4>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:8px;">
                <input type="text" id="pvzAddress" placeholder="Адрес ПВЗ">
                <input type="text" id="pvzLogin" placeholder="Логин">
                <input type="text" id="pvzPassword" placeholder="Пароль">
            </div>
            <button class="btn btn-success" id="createPvzBtn">➕ Создать</button>
        </div>
        <div id="pvzList"></div>
    </div>

    <!-- Товары -->
    <div class="tab-content" id="tab-products">
        <div id="productsList"></div>
    </div>

    <!-- Заказы -->
    <div class="tab-content" id="tab-orders">
        <div id="ordersList"></div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    }
}
</script>

<script type="module">
import { initializeApp } from "firebase/app";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "firebase/auth";
import { getDatabase, ref, set, get, push, onValue, remove } from "firebase/database";
import { firebaseConfig } from "./js/firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let allProducts = [];
let allPvz = [];
let allOrders = [];

// ===== УВЕДОМЛЕНИЯ =====
function showNotif(text, isError = false) {
    const el = document.getElementById('notif') || (() => {
        const d = document.createElement('div');
        d.id = 'notif';
        d.className = 'notification';
        document.body.appendChild(d);
        return d;
    })();
    el.textContent = text;
    el.className = 'notification show ' + (isError ? 'error' : 'success');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

// ===== ВХОД АДМИНА =====
function showAdminLogin() {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal-content">
            <h3>🔐 Вход администратора</h3>
            <label>Логин</label>
            <input type="text" id="adminLogin" value="2347">
            <label>Пароль</label>
            <input type="password" id="adminPassword" value="2203">
            <button class="btn btn-primary" id="adminLoginBtn">Войти</button>
        </div>
    `;
    document.body.appendChild(modal);
    
    document.getElementById('adminLoginBtn').onclick = async () => {
        const login = document.getElementById('adminLogin').value;
        const pass = document.getElementById('adminPassword').value;
        if (login === '2347' && pass === '2203') {
            try {
                await signInWithEmailAndPassword(auth, 'admin@market.com', 'admin123');
                modal.remove();
                showNotif('✅ Вход выполнен!');
            } catch(e) {
                const cred = await createUserWithEmailAndPassword(auth, 'admin@market.com', 'admin123');
                await set(ref(db, 'users/' + cred.user.uid), { role: 'admin', name: 'Администратор' });
                modal.remove();
                showNotif('✅ Вход выполнен!');
            }
        } else {
            showNotif('❌ Неверный логин или пароль!', true);
        }
    };
}

// ===== ДАШБОРД =====
function renderDashboard() {
    const container = document.getElementById('dashboardStats');
    container.innerHTML = `
        <div class="stat-card"><div class="number">${allProducts.length}</div><div class="label">Товаров</div></div>
        <div class="stat-card"><div class="number">${allPvz.length}</div><div class="label">ПВЗ</div></div>
        <div class="stat-card"><div class="number">${allOrders.length}</div><div class="label">Заказов</div></div>
        <div class="stat-card"><div class="number">${allOrders.filter(o => o.status === 'pending').length}</div><div class="label">Ожидают выдачи</div></div>
    `;
}

// ===== РЕНДЕР ПВЗ =====
function renderPvz() {
    const container = document.getElementById('pvzList');
    container.innerHTML = '';
    if (allPvz.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:20px;">Нет ПВЗ</p>';
        return;
    }
    allPvz.forEach(p => {
        const card = document.createElement('div');
        card.className = 'pvz-card';
        card.innerHTML = `
            <div class="address">🏢 ${p.address}</div>
            <div class="login">🔑 Логин: ${p.login}</div>
            <button class="btn btn-danger" data-id="${p.id}" style="margin-top:4px;">🗑 Удалить</button>
        `;
        card.querySelector('.btn').onclick = () => {
            if (confirm('Удалить ПВЗ?')) {
                remove(ref(db, 'pvz/' + p.id));
                showNotif('✅ ПВЗ удалён');
            }
        };
        container.appendChild(card);
    });
}

// ===== РЕНДЕР ТОВАРОВ =====
function renderProducts() {
    const container = document.getElementById('productsList');
    container.innerHTML = '';
    if (allProducts.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:20px;">Нет товаров</p>';
        return;
    }
    allProducts.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
            <div class="name">${p.name}</div>
            <div class="price">${p.price} ₽</div>
            <div class="seller">👤 ${p.sellerName || 'Продавец'}</div>
            <button class="btn btn-danger" data-id="${p.id}" style="margin-top:4px;">🗑 Удалить</button>
        `;
        card.querySelector('.btn').onclick = () => {
            if (confirm('Удалить товар?')) {
                remove(ref(db, 'products/' + p.id));
                showNotif('✅ Товар удалён');
            }
        };
        container.appendChild(card);
    });
}

// ===== РЕНДЕР ЗАКАЗОВ =====
function renderOrders() {
    const container = document.getElementById('ordersList');
    container.innerHTML = '';
    if (allOrders.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:20px;">Нет заказов</p>';
        return;
    }
    allOrders.forEach(o => {
        const statusText = o.status === 'received' ? '✅ Получен' : '⏳ Ожидает';
        const card = document.createElement('div');
        card.className = 'order-card';
        card.innerHTML = `
            <div class="order-header">
                <span>Заказ #${o.id?.slice(0,6) || '...'}</span>
                <span class="status ${o.status}">${statusText}</span>
            </div>
            <div>Клиент: ${o.userName || 'Клиент'}</div>
            <div>Товаров: ${o.items ? o.items.length : 0}</div>
            <div style="font-weight:700;">Итого: ${o.total} ₽</div>
            <div style="font-size:0.75rem;color:#94a3b8;">${new Date(o.createdAt).toLocaleString()}</div>
        `;
        container.appendChild(card);
    });
}

// ===== ЗАГРУЗКА ДАННЫХ =====
function loadData() {
    onValue(ref(db, 'products'), (snap) => {
        allProducts = [];
        if (snap.exists()) {
            const data = snap.val();
            for (const key in data) allProducts.push({ id: key, ...data[key] });
        }
        renderDashboard();
        renderProducts();
    });
    
    onValue(ref(db, 'pvz'), (snap) => {
        allPvz = [];
        if (snap.exists()) {
            const data = snap.val();
            for (const key in data) allPvz.push({ id: key, ...data[key] });
        }
        renderDashboard();
        renderPvz();
    });
    
    onValue(ref(db, 'orders'), (snap) => {
        allOrders = [];
        if (snap.exists()) {
            const data = snap.val();
            for (const key in data) allOrders.push({ id: key, ...data[key] });
        }
        renderDashboard();
        renderOrders();
    });
}

// ===== СОЗДАНИЕ ПВЗ =====
document.getElementById('createPvzBtn').onclick = () => {
    const address = document.getElementById('pvzAddress').value.trim();
    const login = document.getElementById('pvzLogin').value.trim();
    const password = document.getElementById('pvzPassword').value.trim();
    if (!address || !login || !password) {
        showNotif('❌ Заполните все поля!', true);
        return;
    }
    const newRef = push(ref(db, 'pvz'));
    set(newRef, { address, login, password }).then(() => {
        showNotif('✅ ПВЗ создан!');
        document.getElementById('pvzAddress').value = '';
        document.getElementById('pvzLogin').value = '';
        document.getElementById('pvzPassword').value = '';
    });
};

// ===== ВЫХОД =====
document.getElementById('logoutBtn').onclick = () => {
    signOut(auth);
    showNotif('✅ Выход выполнен');
};

// ===== ПРОВЕРКА АВТОРИЗАЦИИ =====
onAuthStateChanged(auth, async (user) => {
    if (user) {
        const snap = await get(ref(db, 'users/' + user.uid));
        if (snap.exists() && snap.val().role === 'admin') {
            document.getElementById('userBadge').textContent = '👑 Админ';
        } else {
            signOut(auth);
            showAdminLogin();
        }
    } else {
        showAdminLogin();
    }
});

// ===== ВКЛАДКИ =====
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = function() {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('tab-' + this.dataset.tab).classList.add('active');
    };
});

loadData();
</script>
</body>
</html>
