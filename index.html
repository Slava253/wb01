<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Маркетплейс | Клиент</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="libs/qrcode.min.js"></script>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-store"></i> Маркетплейс</h1>
        <div class="header-right">
            <span class="user-badge" id="userBadge">👤 Гость</span>
            <button class="btn btn-outline" id="logoutBtn" style="display:none;">Выйти</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="catalog">📦 Каталог</button>
        <button class="tab-btn" data-tab="cart">🛒 Корзина <span id="cartCount" class="badge">0</span></button>
        <button class="tab-btn" data-tab="orders">📋 Мои заказы</button>
        <button class="tab-btn" data-tab="qr">📱 QR-код</button>
    </div>

    <!-- Каталог -->
    <div class="tab-content active" id="tab-catalog">
        <div id="catalogGrid" class="product-grid"></div>
    </div>

    <!-- Корзина -->
    <div class="tab-content" id="tab-cart">
        <div id="cartContent"></div>
    </div>

    <!-- Мои заказы -->
    <div class="tab-content" id="tab-orders">
        <div id="ordersList"></div>
    </div>

    <!-- QR-код -->
    <div class="tab-content" id="tab-qr">
        <div style="text-align:center;padding:30px;">
            <h2>📱 Ваш QR-код для получения заказа</h2>
            <p style="color:#64748b;margin-bottom:20px;">Покажите этот QR-код в ПВЗ для получения заказа</p>
            <div id="qrCodeContainer"></div>
            <div id="qrOrderInfo" style="margin-top:20px;"></div>
        </div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    }
}
</script>

<script type="module">
import { initializeApp } from "firebase/app";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "firebase/auth";
import { getDatabase, ref, set, get, child, push, onValue, remove, update } from "firebase/database";
import { firebaseConfig } from "./js/firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// ===== СОСТОЯНИЕ =====
let currentUser = null;
let currentUserData = null;
let allProducts = [];
let cart = JSON.parse(localStorage.getItem('cart') || '[]');
let orders = [];

// ===== QR-код =====
function generateQR(data) {
    const container = document.getElementById('qrCodeContainer');
    container.innerHTML = '';
    if (window.QRCode) {
        new QRCode(container, {
            text: JSON.stringify(data),
            width: 200,
            height: 200,
            colorDark: "#0f3b5f",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    } else {
        container.innerHTML = '<p style="color:#94a3b8;">Загрузка QR-библиотеки...</p>';
    }
}

// ===== УВЕДОМЛЕНИЯ =====
function showNotif(text, isError = false) {
    const el = document.getElementById('notif') || (() => {
        const d = document.createElement('div');
        d.id = 'notif';
        d.className = 'notification';
        document.body.appendChild(d);
        return d;
    })();
    el.textContent = text;
    el.className = 'notification show ' + (isError ? 'error' : 'success');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

// ===== РЕНДЕР КАТАЛОГА =====
function renderCatalog() {
    const grid = document.getElementById('catalogGrid');
    grid.innerHTML = '';
    if (allProducts.length === 0) {
        grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#94a3b8;padding:40px;">Нет товаров</p>';
        return;
    }
    allProducts.forEach(p => {
        const inCart = cart.some(item => item.id === p.id);
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
            <div class="name">${p.name}</div>
            <div class="price">${p.price} ₽</div>
            <div class="seller">👤 ${p.sellerName || 'Продавец'}</div>
            <div style="font-size:0.85rem;color:#475569;">${p.desc || ''}</div>
            <button class="btn ${inCart ? 'btn-danger' : 'btn-success'}" style="width:100%;margin-top:8px;" data-id="${p.id}">
                ${inCart ? '🗑 Убрать' : '🛒 В корзину'}
            </button>
        `;
        const btn = card.querySelector('button');
        btn.onclick = () => {
            if (!currentUser) {
                showAuthModal();
                return;
            }
            const idx = cart.findIndex(item => item.id === p.id);
            if (idx > -1) {
                cart.splice(idx, 1);
            } else {
                cart.push({ id: p.id, name: p.name, price: p.price, sellerId: p.sellerId });
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            renderCatalog();
        };
        grid.appendChild(card);
    });
}

// ===== КОРЗИНА =====
function renderCart() {
    const container = document.getElementById('cartContent');
    if (cart.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:40px;">Корзина пуста</p>';
        return;
    }
    let html = '<div class="cart-list">';
    let total = 0;
    cart.forEach((item, idx) => {
        total += parseInt(item.price);
        html += `
            <div class="cart-item">
                <span><strong>${item.name}</strong> - ${item.price} ₽</span>
                <button class="btn btn-danger" data-idx="${idx}">✕</button>
            </div>
        `;
    });
    html += `</div><div style="margin-top:16px;font-weight:700;font-size:1.2rem;">Итого: ${total} ₽</div>`;
    html += `<button class="btn btn-primary" id="createOrderBtn" style="margin-top:12px;">📦 Оформить заказ</button>`;
    container.innerHTML = html;
    
    container.querySelectorAll('.cart-item button').forEach(btn => {
        btn.onclick = () => {
            cart.splice(parseInt(btn.dataset.idx), 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            renderCart();
            renderCatalog();
        };
    });
    
    const orderBtn = document.getElementById('createOrderBtn');
    if (orderBtn) {
        orderBtn.onclick = async () => {
            if (!currentUser) {
                showAuthModal();
                return;
            }
            if (cart.length === 0) {
                showNotif('❌ Корзина пуста!', true);
                return;
            }
            const order = {
                userId: currentUser.uid,
                userName: currentUserData?.name || 'Клиент',
                items: cart.map(item => ({ id: item.id, name: item.name, price: item.price })),
                total: cart.reduce((sum, i) => sum + parseInt(i.price), 0),
                status: 'pending', // pending, received
                createdAt: Date.now(),
                qrData: {
                    userId: currentUser.uid,
                    items: cart.map(item => ({ name: item.name, price: item.price }))
                }
            };
            const newRef = push(ref(db, 'orders'));
            await set(newRef, order);
            cart = [];
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            showNotif('✅ Заказ оформлен! QR-код готов.');
            renderCart();
            renderCatalog();
            renderOrders();
            renderQR();
        };
    }
}

// ===== ЗАКАЗЫ =====
function renderOrders() {
    const container = document.getElementById('ordersList');
    if (!currentUser) {
        container.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:40px;">Войдите чтобы видеть заказы</p>';
        return;
    }
    const userOrders = orders.filter(o => o.userId === currentUser.uid);
    if (userOrders.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:40px;">У вас нет заказов</p>';
        return;
    }
    let html = '';
    userOrders.forEach(o => {
        const statusText = o.status === 'received' ? '✅ Получено' : '⏳ Ожидает выдачи';
        html += `
            <div class="order-card">
                <div class="order-header">
                    <span>Заказ #${o.id?.slice(0,6) || '...'}</span>
                    <span class="status ${o.status}">${statusText}</span>
                </div>
                <div>${o.items.map(i => `${i.name} (${i.price} ₽)`).join(', ')}</div>
                <div style="font-weight:700;margin-top:4px;">Итого: ${o.total} ₽</div>
                <div style="font-size:0.75rem;color:#94a3b8;">${new Date(o.createdAt).toLocaleString()}</div>
            </div>
        `;
    });
    container.innerHTML = html;
}

// ===== QR-КОД =====
function renderQR() {
    const container = document.getElementById('qrCodeContainer');
    const info = document.getElementById('qrOrderInfo');
    
    if (!currentUser) {
        container.innerHTML = '<p style="color:#94a3b8;">Войдите чтобы увидеть QR-код</p>';
        info.innerHTML = '';
        return;
    }
    
    const userOrders = orders.filter(o => o.userId === currentUser.uid && o.status === 'pending');
    if (userOrders.length === 0) {
        container.innerHTML = '<p style="color:#94a3b8;">Нет активных заказов для QR-кода</p>';
        info.innerHTML = '';
        return;
    }
    
    const order = userOrders[0];
    const qrData = {
        orderId: order.id,
        userId: currentUser.uid,
        items: order.items.map(i => ({ name: i.name, price: i.price })),
        total: order.total
    };
    
    generateQR(qrData);
    info.innerHTML = `
        <div style="background:#f8fafc;padding:16px;border-radius:12px;border:1px solid #e2e8f0;max-width:400px;margin:0 auto;">
            <p><strong>Заказ:</strong> ${order.items.length} товаров</p>
            <p><strong>Итого:</strong> ${order.total} ₽</p>
            <p style="font-size:0.85rem;color:#94a3b8;">Покажите QR-код в ПВЗ</p>
        </div>
    `;
}

// ===== КОРЗИНА СЧЁТЧИК =====
function updateCartCount() {
    document.getElementById('cartCount').textContent = cart.length;
}

// ===== АВТОРИЗАЦИЯ =====
function showAuthModal() {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal-content">
            <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button>
            <h3>🔐 Вход / Регистрация</h3>
            <label>Email</label>
            <input type="email" id="authEmail" placeholder="email@example.com">
            <label>Пароль</label>
            <input type="password" id="authPassword" placeholder="Пароль">
            <label>Имя (для продавца)</label>
            <input type="text" id="authName" placeholder="Ваше имя">
            <button class="btn btn-primary" id="authLoginBtn">Войти</button>
            <button class="btn btn-success" id="authRegisterBtn">Зарегистрироваться</button>
        </div>
    `;
    document.body.appendChild(modal);
    
    document.getElementById('authLoginBtn').onclick = async () => {
        const email = document.getElementById('authEmail').value;
        const pass = document.getElementById('authPassword').value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            modal.remove();
            showNotif('✅ Вход выполнен!');
        } catch(e) {
            showNotif('❌ ' + e.message, true);
        }
    };
    
    document.getElementById('authRegisterBtn').onclick = async () => {
        const email = document.getElementById('authEmail').value;
        const pass = document.getElementById('authPassword').value;
        const name = document.getElementById('authName').value || 'Клиент';
        try {
            const cred = await createUserWithEmailAndPassword(auth, email, pass);
            await set(ref(db, 'users/' + cred.user.uid), { role: 'client', name: name });
            modal.remove();
            showNotif('✅ Регистрация успешна!');
        } catch(e) {
            showNotif('❌ ' + e.message, true);
        }
    };
}

// ===== ВЫХОД =====
document.getElementById('logoutBtn').onclick = () => {
    signOut(auth);
    showNotif('✅ Выход выполнен');
};

// ===== ПРОВЕРКА АВТОРИЗАЦИИ =====
onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUser = user;
        const snap = await get(ref(db, 'users/' + user.uid));
        if (snap.exists()) {
            currentUserData = snap.val();
            document.getElementById('userBadge').textContent = '👤 ' + (currentUserData.name || 'Пользователь');
            document.getElementById('logoutBtn').style.display = 'inline-block';
        }
    } else {
        currentUser = null;
        currentUserData = null;
        document.getElementById('userBadge').textContent = '👤 Гость';
        document.getElementById('logoutBtn').style.display = 'none';
    }
    renderOrders();
    renderQR();
});

// ===== ЗАГРУЗКА ДАННЫХ =====
function loadData() {
    // Товары
    const productsRef = ref(db, 'products');
    onValue(productsRef, (snap) => {
        allProducts = [];
        if (snap.exists()) {
            const data = snap.val();
            for (const key in data) {
                allProducts.push({ id: key, ...data[key] });
            }
        }
        renderCatalog();
    });
    
    // Заказы
    const ordersRef = ref(db, 'orders');
    onValue(ordersRef, (snap) => {
        orders = [];
        if (snap.exists()) {
            const data = snap.val();
            for (const key in data) {
                orders.push({ id: key, ...data[key] });
            }
        }
        renderOrders();
        renderQR();
    });
}

// ===== ВКЛАДКИ =====
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = function() {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('tab-' + this.dataset.tab).classList.add('active');
        
        if (this.dataset.tab === 'cart') renderCart();
        if (this.dataset.tab === 'orders') renderOrders();
        if (this.dataset.tab === 'qr') renderQR();
    };
});

// ===== ЗАПУСК =====
updateCartCount();
loadData();
showNotif('✅ Добро пожаловать!');
</script>
</body>
</html>
