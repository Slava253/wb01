<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Маркетплейс | Клиент</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="libs/qrcode.min.js"></script>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-store"></i> Маркетплейс</h1>
        <div class="header-right">
            <span class="user-badge" id="userBadge">👤 Гость</span>
            <button class="btn btn-outline" id="logoutBtn">Выйти</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="catalog">📦 Каталог</button>
        <button class="tab-btn" data-tab="cart">🛒 Корзина <span id="cartCount" class="badge">0</span></button>
        <button class="tab-btn" data-tab="orders">📋 Мои заказы</button>
        <button class="tab-btn" data-tab="qr">📱 QR-код</button>
    </div>

    <div class="tab-content active" id="tab-catalog"><div id="catalogGrid" class="product-grid"></div></div>
    <div class="tab-content" id="tab-cart"><div id="cartContent"></div></div>
    <div class="tab-content" id="tab-orders"><div id="ordersList"></div></div>
    <div class="tab-content" id="tab-qr">
        <div style="text-align:center;padding:30px;">
            <h2>📱 Ваш QR-код для получения заказа</h2>
            <p style="color:#64748b;margin-bottom:20px;">Покажите этот QR-код в ПВЗ для получения заказа</p>
            <div id="qrCodeContainer"></div>
            <div id="qrOrderInfo" style="margin-top:20px;"></div>
        </div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    }
}
</script>

<script type="module">
import { initializeApp } from "firebase/app";
import { getAuth, signOut, onAuthStateChanged } from "firebase/auth";
import { getDatabase, ref, get } from "firebase/database";
import { firebaseConfig } from "./js/firebase-config.js";
import { showNotif, onAuth } from "./js/auth.js";
import { getProducts } from "./js/products.js";
import { getOrders, getUserOrders, createOrder } from "./js/orders.js";
import { getCart, getCartCount, getCartTotal, addToCart, removeFromCart, clearCart } from "./js/cart.js";
import { generateQR, createQRData } from "./js/qr.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentUser = null;
let currentUserData = null;
let allProducts = [];
let allOrders = [];
let cart = getCart();

// ===== ОБНОВЛЕНИЕ КОРЗИНЫ =====
function updateCartUI() {
    document.getElementById('cartCount').textContent = cart.length;
}

// ===== РЕНДЕР КАТАЛОГА =====
function renderCatalog() {
    const grid = document.getElementById('catalogGrid');
    grid.innerHTML = '';
    if (allProducts.length === 0) {
        grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#94a3b8;padding:40px;">Нет товаров</p>';
        return;
    }
    allProducts.forEach(p => {
        const inCart = cart.some(item => item.id === p.id);
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
            <div class="name">${p.name}</div>
            <div class="price">${p.price} ₽</div>
            <div class="seller">👤 ${p.sellerName || 'Продавец'}</div>
            <div style="font-size:0.85rem;color:#475569;">${p.desc || ''}</div>
            <button class="btn ${inCart ? 'btn-danger' : 'btn-success'}" style="width:100%;margin-top:8px;" data-id="${p.id}">
                ${inCart ? '🗑 Убрать' : '🛒 В корзину'}
            </button>
        `;
        const btn = card.querySelector('button');
        btn.onclick = () => {
            if (!currentUser) { showNotif('❌ Войдите в аккаунт!', true); return; }
            const idx = cart.findIndex(item => item.id === p.id);
            if (idx > -1) { cart = removeFromCart(p.id); } else { cart = addToCart(p); }
            updateCartUI();
            renderCatalog();
            renderCart();
        };
        grid.appendChild(card);
    });
}

// ===== РЕНДЕР КОРЗИНЫ =====
function renderCart() {
    const container = document.getElementById('cartContent');
    cart = getCart();
    if (cart.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:40px;">Корзина пуста</p>';
        return;
    }
    let html = '<div class="cart-list">';
    let total = 0;
    cart.forEach((item, idx) => {
        total += parseInt(item.price);
        html += `
            <div class="cart-item">
                <span><strong>${item.name}</strong> - ${item.price} ₽</span>
                <button class="btn btn-danger" data-idx="${idx}">✕</button>
            </div>
        `;
    });
    html += `</div><div style="margin-top:16px;font-weight:700;font-size:1.2rem;">Итого: ${total} ₽</div>`;
    html += `<button class="btn btn-primary" id="createOrderBtn" style="margin-top:12px;">📦 Оформить заказ</button>`;
    container.innerHTML = html;
    
    container.querySelectorAll('.cart-item button').forEach(btn => {
        btn.onclick = () => {
            const idx = parseInt(btn.dataset.idx);
            const item = cart[idx];
            if (item) { cart = removeFromCart(item.id); updateCartUI(); renderCart(); renderCatalog(); }
        };
    });
    
    const orderBtn = document.getElementById('createOrderBtn');
    if (orderBtn) {
        orderBtn.onclick = async () => {
            if (!currentUser) { showNotif('❌ Войдите в аккаунт!', true); return; }
            if (cart.length === 0) { showNotif('❌ Корзина пуста!', true); return; }
            const result = await createOrder(currentUser.uid, currentUserData?.name || 'Клиент', cart);
            if (result.success) {
                cart = clearCart();
                updateCartUI();
                showNotif('✅ Заказ оформлен!');
                renderCart();
                renderCatalog();
                renderOrders();
                renderQR();
            } else {
                showNotif('❌ ' + result.error, true);
            }
        };
    }
}

// ===== РЕНДЕР ЗАКАЗОВ =====
function renderOrders() {
    const container = document.getElementById('ordersList');
    if (!currentUser) {
        container.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:40px;">Войдите чтобы видеть заказы</p>';
        return;
    }
    const userOrders = allOrders.filter(o => o.userId === currentUser.uid);
    if (userOrders.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:40px;">У вас нет заказов</p>';
        return;
    }
    let html = '';
    userOrders.forEach(o => {
        const statusText = o.status === 'received' ? '✅ Получено' : '⏳ Ожидает выдачи';
        html += `
            <div class="order-card">
                <div class="order-header">
                    <span>Заказ #${o.id?.slice(0,6) || '...'}</span>
                    <span class="status ${o.status}">${statusText}</span>
                </div>
                <div>${o.items ? o.items.map(i => `${i.name} (${i.price} ₽)`).join(', ') : ''}</div>
                <div style="font-weight:700;margin-top:4px;">Итого: ${o.total} ₽</div>
                <div style="font-size:0.75rem;color:#94a3b8;">${new Date(o.createdAt).toLocaleString()}</div>
            </div>
        `;
    });
    container.innerHTML = html;
}

// ===== РЕНДЕР QR =====
function renderQR() {
    const container = document.getElementById('qrCodeContainer');
    const info = document.getElementById('qrOrderInfo');
    if (!currentUser) {
        container.innerHTML = '<p style="color:#94a3b8;">Войдите чтобы увидеть QR-код</p>';
        info.innerHTML = '';
        return;
    }
    const userOrders = allOrders.filter(o => o.userId === currentUser.uid && o.status === 'pending');
    if (userOrders.length === 0) {
        container.innerHTML = '<p style="color:#94a3b8;">Нет активных заказов для QR-кода</p>';
        info.innerHTML = '';
        return;
    }
    const order = userOrders[0];
    const qrData = { orderId: order.id, userId: currentUser.uid, items: order.items.map(i => ({ name: i.name, price: i.price })), total: order.total };
    generateQR(container, qrData);
    info.innerHTML = `
        <div style="background:#f8fafc;padding:16px;border-radius:12px;border:1px solid #e2e8f0;max-width:400px;margin:0 auto;">
            <p><strong>Заказ:</strong> ${order.items.length} товаров</p>
            <p><strong>Итого:</strong> ${order.total} ₽</p>
            <p style="font-size:0.85rem;color:#94a3b8;">Покажите QR-код в ПВЗ</p>
        </div>
    `;
}

// ===== ВЫХОД =====
document.getElementById('logoutBtn').onclick = async () => {
    await signOut(auth);
    window.location.href = 'vxod.html';
};

// ===== ПРОВЕРКА АВТОРИЗАЦИИ =====
onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUser = user;
        const snap = await get(ref(db, 'users/' + user.uid));
        if (snap.exists()) {
            currentUserData = snap.val();
            document.getElementById('userBadge').textContent = '👤 ' + (currentUserData.name || 'Пользователь');
        }
    } else {
        window.location.href = 'vxod.html';
    }
});

// ===== ЗАГРУЗКА ДАННЫХ =====
getProducts((products) => { allProducts = products; renderCatalog(); });
getOrders((orders) => { allOrders = orders; renderOrders(); renderQR(); });
getUserOrders(currentUser?.uid || '', (orders) => { allOrders = orders; renderOrders(); renderQR(); });

// ===== ВКЛАДКИ =====
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = function() {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('tab-' + this.dataset.tab).classList.add('active');
        if (this.dataset.tab === 'cart') renderCart();
        if (this.dataset.tab === 'orders') renderOrders();
        if (this.dataset.tab === 'qr') renderQR();
    };
});

updateCartUI();
</script>
</body>
</html>
