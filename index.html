<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WHOPPER MARKET</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial,sans-serif; background:#0f0f1a; color:#fff; padding:10px; min-height:100vh; }
        .container { max-width:500px; margin:0 auto; }
        .hidden { display:none !important; }
        .header { display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.05); padding:10px 14px; border-radius:16px; margin-bottom:12px; }
        .logo { font-size:1.2rem; font-weight:bold; color:#f5a623; }
        .user-badge { font-size:0.7rem; color:#888; background:rgba(255,255,255,0.05); padding:4px 12px; border-radius:30px; }
        .role-selector { display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
        .role-btn { flex:1; padding:8px 4px; border-radius:12px; border:2px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); color:#888; cursor:pointer; font-weight:bold; font-size:0.55rem; text-align:center; min-width:45px; }
        .role-btn.active { border-color:#f5a623; color:#f5a623; background:rgba(245,166,35,0.1); }
        .role-btn i { display:block; font-size:0.9rem; margin-bottom:2px; }
        .btn { padding:6px 16px; border-radius:30px; border:none; font-weight:bold; cursor:pointer; font-size:0.8rem; transition:0.2s; }
        .btn-primary { background:#f5a623; color:#1a1a2e; }
        .btn-success { background:#4CAF50; color:#fff; }
        .btn-danger { background:#ef4444; color:#fff; }
        .btn-secondary { background:rgba(255,255,255,0.08); color:#fff; }
        .btn-info { background:#2196F3; color:#fff; }
        .form-group { margin-bottom:8px; }
        .form-group label { display:block; font-size:0.7rem; color:#888; margin-bottom:3px; }
        .form-group input, .form-group textarea { width:100%; padding:8px 12px; border-radius:30px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.05); color:#fff; font-size:0.85rem; outline:none; font-family:inherit; }
        .form-group textarea { border-radius:14px; min-height:60px; resize:vertical; }
        .auth-box { background:rgba(255,255,255,0.03); border-radius:16px; padding:16px; margin-bottom:12px; border:1px solid rgba(255,255,255,0.05); }
        .auth-box h3 { margin-bottom:10px; color:#f5a623; font-size:0.95rem; }
        .auth-actions { display:flex; gap:6px; margin-top:10px; }
        .auth-actions button { flex:1; padding:8px; border-radius:30px; border:none; font-weight:bold; cursor:pointer; font-size:0.75rem; }
        .product-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; margin-bottom:12px; }
        .product-card { background:rgba(255,255,255,0.05); border-radius:14px; padding:10px; text-align:center; border:1px solid rgba(255,255,255,0.05); cursor:pointer; transition:0.2s; }
        .product-card:hover { background:rgba(255,255,255,0.08); }
        .product-card .name { font-weight:600; font-size:0.8rem; margin-bottom:3px; }
        .product-card .price { color:#f5a623; font-weight:bold; font-size:0.9rem; }
        .product-card .add-btn { margin-top:6px; background:#f5a623; color:#1a1a2e; border:none; padding:4px 12px; border-radius:30px; font-weight:bold; cursor:pointer; font-size:0.65rem; }
        .cart-panel { background:rgba(255,255,255,0.03); border-radius:14px; padding:12px; margin-bottom:12px; border:1px solid rgba(255,255,255,0.05); }
        .cart-panel .title { font-weight:bold; margin-bottom:8px; color:#f5a623; font-size:0.9rem; }
        .cart-item { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid rgba(255,255,255,0.05); font-size:0.8rem; }
        .cart-total { font-weight:bold; font-size:1rem; margin-top:8px; padding-top:8px; border-top:2px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between; }
        .cart-actions { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
        .cart-actions button { flex:1; padding:8px; border-radius:30px; border:none; font-weight:bold; cursor:pointer; min-width:70px; font-size:0.75rem; }
        .wallet { background:rgba(255,255,255,0.03); border-radius:14px; padding:10px 14px; margin-bottom:10px; border:1px solid rgba(255,255,255,0.08); display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
        .wallet .amount { font-size:1.1rem; font-weight:bold; color:#f5a623; }
        .order-card { background:rgba(255,255,255,0.04); border-radius:14px; padding:12px; margin-bottom:8px; border-left:4px solid #f5a623; }
        .order-card .order-header { display:flex; justify-content:space-between; font-weight:bold; margin-bottom:4px; font-size:0.8rem; }
        .order-card .order-number { color:#f5a623; font-size:0.8rem; }
        .order-card .order-status { font-size:0.6rem; padding:2px 10px; border-radius:30px; }
        .status-waiting { background:#ff9800; color:#fff; }
        .status-ready { background:#4CAF50; color:#fff; }
        .status-delivered { background:#999; color:#fff; }
        .order-card .order-code { font-size:1.8rem; font-weight:bold; color:#f5a623; font-family:monospace; letter-spacing:8px; background:rgba(255,255,255,0.08); padding:10px; border-radius:12px; margin:6px 0; text-align:center; border:2px solid rgba(245,166,35,0.25); }
        .tabs { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
        .tab { padding:6px 14px; border-radius:30px; background:rgba(255,255,255,0.05); cursor:pointer; font-size:0.7rem; color:#888; border:1px solid transparent; }
        .tab.active { background:rgba(245,166,35,0.15); color:#f5a623; border-color:#f5a623; }
        .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:40px; z-index:999; opacity:0; transition:0.3s; pointer-events:none; font-weight:600; max-width:90%; text-align:center; font-size:0.8rem; }
        .toast.show { opacity:1; }
        .modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.85); z-index:1000; display:flex; align-items:center; justify-content:center; padding:20px; }
        .modal-content { background:#1a1a2e; border-radius:20px; padding:20px; max-width:450px; width:100%; max-height:90vh; overflow-y:auto; border:1px solid rgba(255,255,255,0.08); }
        .modal-content h3 { color:#f5a623; margin-bottom:10px; font-size:1.1rem; }
        .modal-close { float:right; background:none; border:none; color:#888; font-size:1.2rem; cursor:pointer; }
        .qr-code-container { display:flex; justify-content:center; padding:10px; }
        .qr-code-container canvas { border-radius:12px; background:white; padding:10px; }
        .scanner-container { background:#000; border-radius:16px; overflow:hidden; position:relative; min-height:300px; display:flex; align-items:center; justify-content:center; margin:10px 0; }
        .scanner-container video { width:100%; display:block; }
        .scanner-overlay { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:200px; height:200px; border:2px solid #f5a623; border-radius:12px; box-shadow:0 0 0 4000px rgba(0,0,0,0.4); pointer-events:none; }
        .scan-btn-group { display:flex; gap:6px; flex-wrap:wrap; margin:10px 0; }
        .scan-btn-group button { flex:1; padding:8px; border-radius:30px; border:none; font-weight:bold; cursor:pointer; font-size:0.75rem; }
        .scanned-order { background:rgba(76,175,80,0.1); border:1px solid #4CAF50; border-radius:12px; padding:12px; margin-top:10px; }
        .scanned-order .label { color:#888; font-size:0.7rem; }
        @media (max-width:400px) { 
            .product-grid { grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); } 
            .order-card .order-code { font-size:1.3rem; letter-spacing:4px; } 
            .scanner-overlay { width:150px; height:150px; }
        }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="container">
    <div class="header">
        <div class="logo">📦 WHOPPER</div>
        <div class="user-badge">👤 <span id="userNameDisplay">Гость</span></div>
    </div>

    <div class="role-selector">
        <button class="role-btn active" data-role="client" onclick="switchRole('client')"><i>🛒</i> Клиент</button>
        <button class="role-btn" data-role="seller" onclick="switchRole('seller')"><i>🏪</i> Продавец</button>
        <button class="role-btn" data-role="pvz" onclick="switchRole('pvz')"><i>📦</i> ПВЗ</button>
    </div>

    <!-- КЛИЕНТ -->
    <div id="clientPanel">
        <div id="clientAuth" class="auth-box">
            <h3>👤 Вход / Регистрация</h3>
            <div class="form-group"><label>Логин</label><input type="text" id="loginInput" placeholder="Введите логин"></div>
            <div class="form-group"><label>Имя</label><input type="text" id="nameInput" placeholder="Ваше имя"></div>
            <div class="auth-actions">
                <button class="btn-primary" onclick="clientLogin()">Войти</button>
                <button class="btn-success" onclick="clientRegister()">Регистрация</button>
            </div>
        </div>
        <div id="clientContent" class="hidden">
            <div class="wallet" onclick="addMoney()"><span>💰 Кошелёк</span><span class="amount" id="clientWallet">0 ₽</span></div>
            <div class="tabs">
                <button class="tab active" data-ctab="shop" onclick="switchClientTab('shop')">🛍️ Магазин</button>
                <button class="tab" data-ctab="orders" onclick="switchClientTab('orders')">📦 Заказы</button>
                <button class="tab" data-ctab="qr" onclick="switchClientTab('qr')">📱 QR-код</button>
            </div>
            <div id="clientShopTab">
                <div class="product-grid" id="productsGrid"></div>
                <div class="cart-panel">
                    <div class="title">🛒 Корзина</div>
                    <div id="cartItems"><div style="color:#555;">Пусто</div></div>
                    <div class="cart-total"><span>Итого:</span> <span id="cartTotal">0 ₽</span></div>
                    <div class="cart-actions">
                        <button class="btn-primary" onclick="createOrder()">Оформить</button>
                        <button class="btn-secondary" onclick="clearCart()">Очистить</button>
                    </div>
                </div>
            </div>
            <div id="clientOrdersTab" class="hidden"><div id="ordersList"></div></div>
            <div id="clientQrTab" class="hidden">
                <div style="text-align:center;padding:20px;">
                    <h3 style="color:#f5a623;">📱 Ваш QR-код</h3>
                    <p style="color:#888;font-size:0.85rem;margin-bottom:15px;">Покажите в ПВЗ</p>
                    <div id="qrContainer" class="qr-code-container"></div>
                    <div id="qrInfo" style="margin-top:10px;color:#888;font-size:0.8rem;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ПРОДАВЕЦ -->
    <div id="sellerPanel" class="hidden">
        <div id="sellerAuth" class="auth-box">
            <h3>🏪 Вход продавца</h3>
            <div class="form-group"><label>Логин</label><input type="text" id="sellerLoginInput" placeholder="Логин"></div>
            <div class="form-group"><label>Пароль</label><input type="password" id="sellerPassInput" placeholder="Пароль"></div>
            <div class="auth-actions">
                <button class="btn-primary" onclick="sellerLogin()">Войти</button>
                <button class="btn-success" onclick="sellerRegister()">Регистрация</button>
            </div>
        </div>
        <div id="sellerContent" class="hidden">
            <div class="wallet" onclick="addMoney()"><span>💰 Кошелёк</span><span class="amount" id="sellerWallet">0 ₽</span></div>
            <div style="background:rgba(255,255,255,0.03);border-radius:14px;padding:14px;margin-bottom:12px;">
                <h4 style="color:#f5a623;">➕ Добавить товар</h4>
                <div class="form-group"><label>Название</label><input type="text" id="productName" placeholder="Название"></div>
                <div class="form-group"><label>Цена</label><input type="number" id="productPrice" placeholder="999"></div>
                <button class="btn-success" onclick="addProduct()" style="width:100%;padding:8px;border-radius:30px;border:none;font-weight:bold;cursor:pointer;">➕ Добавить</button>
            </div>
            <h4 style="color:#f5a623;font-size:0.9rem;">📦 Мои товары</h4>
            <div id="sellerProducts"></div>
        </div>
    </div>

    <!-- ПВЗ -->
    <div id="pvzPanel" class="hidden">
        <div id="pvzAuth" class="auth-box">
            <h3>🏪 Вход ПВЗ</h3>
            <div class="form-group"><label>Код ПВЗ (по умолчанию: 12345)</label><input type="text" id="pvzCode" placeholder="Введите код ПВЗ"></div>
            <div class="auth-actions"><button class="btn-primary" onclick="pvzLogin()">Войти</button></div>
        </div>
        <div id="pvzContent" class="hidden">
            <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px;">
                <button class="btn-primary" onclick="pvzView('pending')">📥 Заказы</button>
                <button class="btn-success" onclick="pvzView('ready')">📤 Выдача</button>
            </div>
            
            <!-- СКАНИРОВАНИЕ QR -->
            <div style="background:rgba(255,255,255,0.03);border-radius:14px;padding:14px;margin-bottom:12px;">
                <h4 style="color:#f5a623;font-size:0.85rem;margin-bottom:8px;">📷 Сканировать QR-код</h4>
                <div class="scan-btn-group">
                    <button class="btn-info" onclick="startScanner()">📷 Запустить камеру</button>
                    <button class="btn-danger" onclick="stopScanner()">⏹ Остановить</button>
                </div>
                <div id="scannerContainer" class="scanner-container hidden">
                    <div class="scanner-overlay"></div>
                </div>
                <div id="scannedResult"></div>
            </div>
            
            <!-- Ручной поиск -->
            <div class="scan-area">
                <h4 style="color:#f5a623;font-size:0.85rem;">🔑 Поиск по коду</h4>
                <input type="text" id="pvzSearch" placeholder="6-значный код" maxlength="6" oninput="pvzFindOrder(this.value)">
                <div id="pvzResult" style="margin-top:6px;"></div>
            </div>
            <div id="pvzOrdersList"></div>
        </div>
    </div>
</div>

<!-- МОДАЛКА ТОВАРА -->
<div id="productModal" class="modal-overlay hidden" onclick="if(event.target===this) closeModal()">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <h3 id="modalName">Товар</h3>
        <div id="modalPrice" style="color:#f5a623;font-size:1.3rem;font-weight:bold;">0 ₽</div>
        <div id="modalSeller" style="color:#888;font-size:0.75rem;">Продавец</div>
        <button class="btn btn-primary" onclick="addToCartFromModal()" style="width:100%;margin-top:10px;">🛒 В корзину</button>
    </div>
</div>

<script>
// ========== FIREBASE ==========
const firebaseConfig = {
    apiKey: "AIzaSyBlZ5ZtyTXgtXxSJAx1jOxwhTrzlHRJmo",
    authDomain: "bk-cashier.firebaseapp.com",
    databaseURL: "https://bk-cashier-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "bk-cashier",
    storageBucket: "bk-cashier.firebasestorage.app",
    messagingSenderId: "385000840969",
    appId: "1:385000840969:web:1ec8d09176b6551dc0fdd8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ========== ПЕРЕМЕННЫЕ ==========
let currentUser = null;
let currentRole = 'client';
let cart = [];
let selectedProduct = null;
let html5QrCode = null;
let isScanning = false;

// ========== ТОСТ ==========
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timeout);
    t._timeout = setTimeout(() => t.classList.remove('show'), 2500);
}

// ========== ГЕНЕРАЦИЯ QR ==========
function generateQR(container, data) {
    container.innerHTML = '';
    if (typeof QRCode !== 'undefined') {
        try {
            new QRCode(container, {
                text: JSON.stringify(data),
                width: 180,
                height: 180,
                colorDark: "#f5a623",
                colorLight: "#1a1a2e",
                correctLevel: QRCode.CorrectLevel.H
            });
            return true;
        } catch(e) {
            container.innerHTML = '<div style="color:#888;">⚠️ Ошибка QR</div>';
            return false;
        }
    }
    container.innerHTML = '<div style="color:#888;">⏳ Загрузка QR...</div>';
    return false;
}

// ========== QR-СКАНЕР ==========
function startScanner() {
    const container = document.getElementById('scannerContainer');
    const resultDiv = document.getElementById('scannedResult');
    resultDiv.innerHTML = '';
    container.classList.remove('hidden');
    
    if (html5QrCode) {
        html5QrCode.stop();
        html5QrCode.clear();
    }
    
    html5QrCode = new Html5Qrcode("scannerContainer");
    
    const config = {
        fps: 10,
        qrbox: { width: 250, height: 250 },
        aspectRatio: 1.0
    };
    
    html5QrCode.start(
        { facingMode: "environment" },
        config,
        onScanSuccess,
        onScanError
    ).then(() => {
        isScanning = true;
        showToast('📷 Камера запущена');
    }).catch(err => {
        showToast('❌ Ошибка камеры: ' + err);
        container.classList.add('hidden');
    });
}

function stopScanner() {
    if (html5QrCode) {
        html5QrCode.stop();
        html5QrCode.clear();
        isScanning = false;
        document.getElementById('scannerContainer').classList.add('hidden');
        showToast('⏹ Сканирование остановлено');
    }
}

function onScanSuccess(decodedText, decodedResult) {
    console.log('Сканировано:', decodedText);
    document.getElementById('scannerContainer').classList.add('hidden');
    stopScanner();
    
    try {
        const data = JSON.parse(decodedText);
        showToast('✅ Найден заказ: ' + data.orderId);
        processScannedOrder(data);
    } catch(e) {
        // Если не JSON, пробуем найти по тексту
        showToast('📱 Сканировано: ' + decodedText);
        findOrderByText(decodedText);
    }
}

function onScanError(error) {
    // Игнорируем ошибки
}

function processScannedOrder(data) {
    const resultDiv = document.getElementById('scannedResult');
    db.ref('orders').orderByChild('id').equalTo(data.orderId).once('value', (sn) => {
        if (sn.exists()) {
            sn.forEach(child => {
                const order = child.val();
                resultDiv.innerHTML = `
                    <div class="scanned-order">
                        <div style="color:#4CAF50;font-weight:bold;">✅ Заказ найден!</div>
                        <div><span class="label">🆔</span> ${order.id}</div>
                        <div><span class="label">👤</span> ${order.user}</div>
                        <div><span class="label">📦</span> ${order.items.map(i => `${i.name} x${i.qty}`).join(', ')}</div>
                        <div><span class="label">💰</span> ${order.total} ₽</div>
                        <div><span class="label">🔑</span> ${order.code}</div>
                        <div><span class="label">📌 Статус:</span> ${order.status === 'pending' ? '⏳ Ожидает' : order.status === 'ready' ? '✅ Готов' : '📦 Выдан'}</div>
                        ${order.status === 'pending' ? `<button class="btn-success" onclick="pvzReadyFromScan('${order.id}')" style="margin-top:8px;padding:6px 16px;border-radius:30px;border:none;font-weight:bold;cursor:pointer;">✅ Готов к выдаче</button>` : ''}
                        ${order.status === 'ready' ? `<button class="btn-primary" onclick="pvzDeliverFromScan('${order.id}')" style="margin-top:8px;padding:6px 16px;border-radius:30px;border:none;font-weight:bold;cursor:pointer;">📤 Выдать</button>` : ''}
                    </div>
                `;
            });
        } else {
            resultDiv.innerHTML = '<div style="color:#ff4444;padding:12px;border:1px solid #ff4444;border-radius:12px;">❌ Заказ не найден</div>';
        }
    });
}

function findOrderByText(text) {
    const resultDiv = document.getElementById('scannedResult');
    // Ищем по ID или коду
    db.ref('orders').once('value', (sn) => {
        let found = false;
        sn.forEach(child => {
            const order = child.val();
            if (order.id === text || order.code === text) {
                found = true;
                resultDiv.innerHTML = `
                    <div class="scanned-order">
                        <div style="color:#4CAF50;font-weight:bold;">✅ Заказ найден!</div>
                        <div><span class="label">🆔</span> ${order.id}</div>
                        <div><span class="label">👤</span> ${order.user}</div>
                        <div><span class="label">📦</span> ${order.items.map(i => `${i.name} x${i.qty}`).join(', ')}</div>
                        <div><span class="label">💰</span> ${order.total} ₽</div>
                        <div><span class="label">🔑</span> ${order.code}</div>
                        <div><span class="label">📌 Статус:</span> ${order.status === 'pending' ? '⏳ Ожидает' : order.status === 'ready' ? '✅ Готов' : '📦 Выдан'}</div>
                        ${order.status === 'pending' ? `<button class="btn-success" onclick="pvzReadyFromScan('${order.id}')" style="margin-top:8px;padding:6px 16px;border-radius:30px;border:none;font-weight:bold;cursor:pointer;">✅ Готов к выдаче</button>` : ''}
                        ${order.status === 'ready' ? `<button class="btn-primary" onclick="pvzDeliverFromScan('${order.id}')" style="margin-top:8px;padding:6px 16px;border-radius:30px;border:none;font-weight:bold;cursor:pointer;">📤 Выдать</button>` : ''}
                    </div>
                `;
            }
        });
        if (!found) {
            resultDiv.innerHTML = '<div style="color:#ff4444;padding:12px;border:1px solid #ff4444;border-radius:12px;">❌ Заказ не найден</div>';
        }
    });
}

// ========== ПЕРЕКЛЮЧЕНИЕ РОЛЕЙ ==========
function switchRole(role) {
    currentRole = role;
    document.querySelectorAll('.role-btn').forEach(b => b.classList.toggle('active', b.dataset.role === role));
    document.querySelectorAll('#clientPanel, #sellerPanel, #pvzPanel').forEach(el => el.classList.add('hidden'));
    if (role === 'client') {
        document.getElementById('clientPanel').classList.remove('hidden');
        document.getElementById('clientContent').classList.add('hidden');
        document.getElementById('clientAuth').classList.remove('hidden');
        loadProducts();
    } else if (role === 'seller') {
        document.getElementById('sellerPanel').classList.remove('hidden');
        document.getElementById('sellerContent').classList.add('hidden');
        document.getElementById('sellerAuth').classList.remove('hidden');
    } else if (role === 'pvz') {
        document.getElementById('pvzPanel').classList.remove('hidden');
        document.getElementById('pvzContent').classList.add('hidden');
        document.getElementById('pvzAuth').classList.remove('hidden');
        if (document.getElementById('scannerContainer')) {
            document.getElementById('scannerContainer').classList.add('hidden');
        }
        if (html5QrCode) {
            html5QrCode.stop();
            html5QrCode.clear();
            isScanning = false;
        }
    }
}

// ========== КЛИЕНТ ==========
function clientLogin() {
    const login = document.getElementById('loginInput').value.trim();
    db.ref('users').orderByChild('login').equalTo(login).once('value', (sn) => {
        if (sn.exists()) {
            sn.forEach(child => {
                currentUser = { id: child.key, ...child.val() };
            });
            showToast('👋 Добро пожаловать, ' + currentUser.name + '!');
            enterClientMode();
        } else {
            showToast('❌ Пользователь не найден');
        }
    });
}

function clientRegister() {
    const login = document.getElementById('loginInput').value.trim();
    const name = document.getElementById('nameInput').value.trim();
    if (!login || !name) { showToast('❌ Заполните все поля'); return; }
    
    db.ref('users').orderByChild('login').equalTo(login).once('value', (sn) => {
        if (sn.exists()) { showToast('❌ Логин занят'); return; }
        
        const user = { login, name, wallet: 1000 };
        const ref = db.ref('users').push();
        ref.set(user).then(() => {
            currentUser = { id: ref.key, ...user };
            showToast('✅ Регистрация успешна! +1000 ₽');
            enterClientMode();
        });
    });
}

function enterClientMode() {
    document.getElementById('clientAuth').classList.add('hidden');
    document.getElementById('clientContent').classList.remove('hidden');
    document.getElementById('userNameDisplay').textContent = currentUser.name + ' 📱';
    document.getElementById('clientWallet').textContent = currentUser.wallet + ' ₽';
    renderCart();
    loadOrders();
    renderClientQR();
    loadProducts();
}

function loadProducts() {
    db.ref('products').on('value', (sn) => {
        const products = [];
        sn.forEach(child => {
            products.push({ id: child.key, ...child.val() });
        });
        renderProducts(products);
    });
}

function renderProducts(products) {
    const grid = document.getElementById('productsGrid');
    if (!products || products.length === 0) {
        grid.innerHTML = '<div style="text-align:center;color:#555;padding:15px;">Товаров нет</div>';
        return;
    }
    grid.innerHTML = products.map((p, idx) => `
        <div class="product-card" onclick="openProduct('${p.id}', ${idx})">
            <div class="name">${p.name}</div>
            <div class="price">${p.price} ₽</div>
            <button class="add-btn" onclick="event.stopPropagation();addToCart('${p.id}')">➕</button>
        </div>
    `).join('');
}

function openProduct(id, idx) {
    db.ref('products/' + id).once('value', (sn) => {
        const p = sn.val();
        if (!p) return;
        selectedProduct = id;
        document.getElementById('modalName').textContent = p.name;
        document.getElementById('modalPrice').textContent = p.price + ' ₽';
        document.getElementById('modalSeller').textContent = '🏪 ' + (p.seller || 'Продавец');
        document.getElementById('productModal').classList.remove('hidden');
    });
}

function closeModal() {
    document.getElementById('productModal').classList.add('hidden');
}

function addToCartFromModal() {
    if (selectedProduct) addToCart(selectedProduct);
    closeModal();
}

function addToCart(productId) {
    db.ref('products/' + productId).once('value', (sn) => {
        const p = sn.val();
        if (!p) return;
        const existing = cart.find(i => i.id === productId);
        if (existing) existing.qty++;
        else cart.push({ id: productId, name: p.name, price: p.price, qty: 1, seller: p.seller });
        renderCart();
        showToast(`✅ ${p.name} добавлен`);
    });
}

function renderCart() {
    const container = document.getElementById('cartItems');
    const totalSpan = document.getElementById('cartTotal');
    if (cart.length === 0) {
        container.innerHTML = '<div style="color:#555;font-size:0.8rem;">Пусто</div>';
        totalSpan.textContent = '0 ₽';
        return;
    }
    let total = 0;
    container.innerHTML = cart.map((item, idx) => {
        total += item.price * item.qty;
        return `<div class="cart-item"><span>${item.name} x${item.qty}</span><span>${(item.price * item.qty)} ₽ <button onclick="removeFromCart(${idx})" style="background:none;border:none;color:#ff4444;cursor:pointer;">✕</button></span></div>`;
    }).join('');
    totalSpan.textContent = total + ' ₽';
}

function removeFromCart(idx) {
    cart.splice(idx, 1);
    renderCart();
}

function clearCart() {
    cart = [];
    renderCart();
    showToast('🗑️ Очищено');
}

function switchClientTab(tab) {
    document.querySelectorAll('#clientContent .tab').forEach(t => t.classList.toggle('active', t.dataset.ctab === tab));
    document.getElementById('clientShopTab').classList.toggle('hidden', tab !== 'shop');
    document.getElementById('clientOrdersTab').classList.toggle('hidden', tab !== 'orders');
    document.getElementById('clientQrTab').classList.toggle('hidden', tab !== 'qr');
    if (tab === 'orders') loadOrders();
    if (tab === 'qr') renderClientQR();
}

function loadOrders() {
    const container = document.getElementById('ordersList');
    db.ref('orders').orderByChild('user').equalTo(currentUser.login).on('value', (sn) => {
        const orders = [];
        sn.forEach(child => {
            orders.push({ id: child.key, ...child.val() });
        });
        orders.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
        
        if (orders.length === 0) {
            container.innerHTML = '<div style="text-align:center;color:#555;padding:20px;">📭 Нет заказов</div>';
            return;
        }
        container.innerHTML = orders.map(o => `
            <div class="order-card">
                <div class="order-header">
                    <span class="order-number">🆔 ${o.id}</span>
                    <span class="order-status ${o.status === 'delivered' ? 'status-delivered' : o.status === 'ready' ? 'status-ready' : 'status-waiting'}">${o.status === 'delivered' ? '📦 Выдан' : o.status === 'ready' ? '✅ Готов' : '⏳ В обработке'}</span>
                </div>
                <div>${o.items.map(i => `${i.name} x${i.qty}`).join(', ')}</div>
                <div style="font-weight:bold;">💰 ${o.total} ₽</div>
                <div class="order-code">🔑 ${o.code}</div>
            </div>
        `).join('');
    });
}

function renderClientQR() {
    const container = document.getElementById('qrContainer');
    const info = document.getElementById('qrInfo');
    if (!currentUser) {
        container.innerHTML = '<div style="color:#888;">Войдите в аккаунт</div>';
        info.textContent = '';
        return;
    }
    
    db.ref('orders').orderByChild('user').equalTo(currentUser.login).once('value', (sn) => {
        const activeOrders = [];
        sn.forEach(child => {
            const order = child.val();
            if (order.status !== 'delivered') {
                activeOrders.push({ id: child.key, ...order });
            }
        });
        
        if (activeOrders.length === 0) {
            container.innerHTML = '<div style="color:#888;">Нет активных заказов</div>';
            info.textContent = 'Оформите заказ';
            return;
        }
        
        const order = activeOrders[0];
        const qrData = { orderId: order.id, user: currentUser.login, items: order.items, total: order.total };
        generateQR(container, qrData);
        info.innerHTML = `<div style="background:rgba(255,255,255,0.05);padding:10px;border-radius:10px;">📦 ${order.items.length} товаров<br>💰 ${order.total} ₽</div>`;
    });
}

function createOrder() {
    if (!currentUser) { showToast('❌ Войдите в аккаунт'); return; }
    if (cart.length === 0) { showToast('❌ Корзина пуста'); return; }
    const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
    if (currentUser.wallet < total) { showToast('❌ Недостаточно средств'); return; }
    
    const orderId = 'ORD' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).substr(2, 4).toUpperCase();
    const code = Math.floor(100000 + Math.random() * 900000).toString();
    const order = {
        id: orderId,
        user: currentUser.login,
        items: cart.map(i => ({ name: i.name, price: i.price, qty: i.qty })),
        total: total,
        code: code,
        status: 'pending',
        createdAt: Date.now()
    };
    
    // Списываем деньги
    currentUser.wallet -= total;
    db.ref('users/' + currentUser.id).update({ wallet: currentUser.wallet });
    document.getElementById('clientWallet').textContent = currentUser.wallet + ' ₽';
    
    db.ref('orders').push().set(order).then(() => {
        cart = [];
        renderCart();
        loadOrders();
        renderClientQR();
        showToast(`✅ Заказ #${orderId} оформлен! Код: ${code}`);
    });
}

function addMoney() {
    if (!currentUser) { showToast('❌ Войдите'); return; }
    const amount = prompt('Введите сумму пополнения:', '500');
    if (amount && !isNaN(amount) && parseInt(amount) > 0) {
        currentUser.wallet += parseInt(amount);
        db.ref('users/' + currentUser.id).update({ wallet: currentUser.wallet });
        document.getElementById('clientWallet').textContent = currentUser.wallet + ' ₽';
        if (currentRole === 'seller') document.getElementById('sellerWallet').textContent = currentUser.wallet + ' ₽';
        showToast(`✅ +${amount} ₽`);
    }
}

// ========== ПРОДАВЕЦ ==========
function sellerRegister() {
    const login = document.getElementById('sellerLoginInput').value.trim();
    const pass = document.getElementById('sellerPassInput').value.trim();
    if (!login || !pass) { showToast('❌ Заполните все поля'); return; }
    
    db.ref('sellers').orderByChild('login').equalTo(login).once('value', (sn) => {
        if (sn.exists()) { showToast('❌ Логин занят'); return; }
        const seller = { login, password: pass, wallet: 0, shopName: 'Магазин ' + login };
        const ref = db.ref('sellers').push();
        ref.set(seller).then(() => {
            showToast('✅ Регистрация продавца успешна!');
            currentUser = { id: ref.key, login: login, name: seller.shopName, wallet: 0 };
            enterSellerMode();
        });
    });
}

function sellerLogin() {
    const login = document.getElementById('sellerLoginInput').value.trim();
    const pass = document.getElementById('sellerPassInput').value.trim();
    db.ref('sellers').orderByChild('login').equalTo(login).once('value', (sn) => {
        if (sn.exists()) {
            let found = false;
            sn.forEach(child => {
                const seller = child.val();
                if (seller.password === pass) {
                    currentUser = { id: child.key, login: login, name: seller.shopName, wallet: seller.wallet || 0 };
                    found = true;
                    showToast('👋 Добро пожаловать, ' + seller.shopName + '!');
                    enterSellerMode();
                }
            });
            if (!found) showToast('❌ Неверный пароль');
        } else {
            showToast('❌ Продавец не найден');
        }
    });
}

function enterSellerMode() {
    document.getElementById('sellerAuth').classList.add('hidden');
    document.getElementById('sellerContent').classList.remove('hidden');
    document.getElementById('userNameDisplay').textContent = currentUser.name + ' 🏪';
    document.getElementById('sellerWallet').textContent = (currentUser.wallet || 0) + ' ₽';
    loadSellerProducts();
}

function loadSellerProducts() {
    const container = document.getElementById('sellerProducts');
    db.ref('products').orderByChild('seller').equalTo(currentUser.name).on('value', (sn) => {
        const products = [];
        sn.forEach(child => {
            products.push({ id: child.key, ...child.val() });
        });
        if (products.length === 0) {
            container.innerHTML = '<div style="color:#555;padding:8px;">Нет товаров</div>';
            return;
        }
        container.innerHTML = products.map(p => `
            <div style="background:rgba(255,255,255,0.03);border-radius:10px;padding:8px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;">
                <div><span style="font-weight:bold;font-size:0.8rem;">${p.name}</span> <span style="color:#f5a623;">${p.price} ₽</span></div>
                <button class="btn-danger" onclick="deleteProduct('${p.id}')" style="padding:4px 10px;border:none;border-radius:30px;cursor:pointer;font-size:0.7rem;">✕</button>
            </div>
        `).join('');
    });
}

function addProduct() {
    if (!currentUser) { showToast('❌ Войдите'); return; }
    const name = document.getElementById('productName').value.trim();
    const price = parseInt(document.getElementById('productPrice').value);
    if (!name || !price || price <= 0) { showToast('❌ Заполните название и цену'); return; }
    
    const product = { name, price, seller: currentUser.name };
    db.ref('products').push().set(product).then(() => {
        document.getElementById('productName').value = '';
        document.getElementById('productPrice').value = '';
        showToast('✅ Товар добавлен!');
    });
}

function deleteProduct(productId) {
    if (!confirm('Удалить товар?')) return;
    db.ref('products/' + productId).remove().then(() => {
        showToast('🗑️ Удалено');
    });
}

// ========== ПВЗ ==========
function pvzLogin() {
    const code = document.getElementById('pvzCode').value.trim();
    if (!code) { showToast('❌ Введите код ПВЗ'); return; }
    if (code === '12345') {
        document.getElementById('pvzAuth').classList.add('hidden');
        document.getElementById('pvzContent').classList.remove('hidden');
        document.getElementById('userNameDisplay').textContent = '🏪 ПВЗ';
        showToast('👋 Добро пожаловать в ПВЗ!');
        pvzView('pending');
    } else {
        showToast('❌ Неверный код ПВЗ');
    }
}

function pvzView(type) {
    const container = document.getElementById('pvzOrdersList');
    const status = type === 'pending' ? 'pending' : 'ready';
    db.ref('orders').orderByChild('status').equalTo(status).on('value', (sn) => {
        const orders = [];
        sn.forEach(child => {
            orders.push({ id: child.key, ...child.val() });
        });
        if (orders.length === 0) {
            container.innerHTML = '<div style="text-align:center;color:#555;padding:20px;">📭 Нет заказов</div>';
            return;
        }
        container.innerHTML = orders.map(o => `
            <div class="order-card">
                <div class="order-header">
                    <span class="order-number">🆔 ${o.id}</span>
                    <span class="order-status ${o.status === 'ready' ? 'status-ready' : 'status-waiting'}">${o.status === 'ready' ? '✅ Готов' : '⏳ Ожидает'}</span>
                </div>
                <div>👤 ${o.user}</div>
                <div>${o.items.map(i => `${i.name} x${i.qty}`).join(', ')}</div>
                <div style="font-weight:bold;">💰 ${o.total} ₽</div>
                <div class="order-code">🔑 ${o.code}</div>
                ${o.status === 'pending' ? `<button class="btn-success" onclick="pvzReady('${o.id}')" style="margin-top:4px;padding:4px 12px;border-radius:30px;border:none;font-weight:bold;cursor:pointer;">✅ Готов к выдаче</button>` : ''}
                ${o.status === 'ready' ? `<button class="btn-primary" onclick="pvzDeliver('${o.id}')" style="margin-top:4px;padding:4px 12px;border-radius:30px;border:none;font-weight:bold;cursor:pointer;">📤 Выдать</button>` : ''}
            </div>
        `).join('');
    });
}

function pvzReady(orderId) {
    db.ref('orders').orderByChild('id').equalTo(orderId).once('value', (sn) => {
        sn.forEach(child => {
            db.ref('orders/' + child.key).update({ status: 'ready' });
            showToast('✅ Заказ готов к выдаче');
        });
    });
}

function pvzDeliver(orderId) {
    db.ref('orders').orderByChild('id').equalTo(orderId).once('value', (sn) => {
        sn.forEach(child => {
            db.ref('orders/' + child.key).update({ status: 'delivered' });
            showToast('✅ Заказ выдан!');
        });
    });
}

function pvzFindOrder(code) {
    const result = document.getElementById('pvzResult');
    if (!code || code.length < 6) { result.innerHTML = ''; return; }
    
    db.ref('orders').orderByChild('code').equalTo(code).once('value', (sn) => {
        if (sn.exists()) {
            sn.forEach(child => {
                const o = child.val();
                result.innerHTML = `
                    <div style="background:rgba(76,175,80,0.15);padding:12px;border-radius:12px;border:1px solid #4CAF50;">
                        <div style="color:#4CAF50;font-weight:bold;">✅ Заказ найден!</div>
                        <div>👤 ${o.user}</div>
                        <div>📦 ${o.items.map(i => `${i.name} x${i.qty}`).join(', ')}</div>
                        <div style="font-weight:bold;">💰 ${o.total} ₽</div>
                        <div>Код: ${o.code}</div>
                        ${o.status === 'ready' ? `<button onclick="pvzDeliver('${o.id}')" style="margin-top:8px;padding:8px 20px;border-radius:30px;border:none;background:#4CAF50;color:white;font-weight:bold;cursor:pointer;">📤 Выдать</button>` : `<div style="color:#ff9800;">Статус: ${o.status === 'pending' ? 'Ожидает' : 'Выдан'}</div>`}
                    </div>
                `;
            });
        } else {
            result.innerHTML = '<div style="color:#ff4444;">❌ Заказ не найден</div>';
        }
    });
}
