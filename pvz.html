<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПВЗ | Сканер QR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-warehouse"></i> ПВЗ</h1>
        <div class="header-right">
            <span class="user-badge" id="userBadge">👤 ПВЗ</span>
            <button class="btn btn-outline" id="logoutBtn">Выйти</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="scan">📷 Сканер QR</button>
        <button class="tab-btn" data-tab="orders">📋 Заказы</button>
    </div>

    <!-- Сканер -->
    <div class="tab-content active" id="tab-scan">
        <div style="text-align:center;padding:30px;">
            <h2>📷 Сканируйте QR-код клиента</h2>
            <p style="color:#64748b;margin-bottom:20px;">Наведите камеру на QR-код для получения заказа</p>
            
            <div id="scanArea" style="border:2px dashed #cbd5e1;border-radius:16px;padding:40px;max-width:400px;margin:0 auto;">
                <i class="fas fa-qrcode" style="font-size:4rem;color:#94a3b8;"></i>
                <p style="margin-top:10px;">Нажмите для сканирования</p>
                <input type="file" id="qrFileInput" accept="image/*" style="display:none;">
                <button class="btn btn-primary" id="scanBtn">📷 Выбрать изображение с QR</button>
                <div id="qrResult" style="margin-top:20px;"></div>
            </div>
            
            <div id="scanResult" style="margin-top:20px;"></div>
        </div>
    </div>

    <!-- Заказы -->
    <div class="tab-content" id="tab-orders">
        <div id="ordersList"></div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    }
}
</script>

<script type="module">
import { initializeApp } from "firebase/app";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "firebase/auth";
import { getDatabase, ref, get, update, onValue } from "firebase/database";
import { firebaseConfig } from "./js/firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentUser = null;
let allOrders = [];

// ===== УВЕДОМЛЕНИЯ =====
function showNotif(text, isError = false) {
    const el = document.getElementById('notif') || (() => {
        const d = document.createElement('div');
        d.id = 'notif';
        d.className = 'notification';
        document.body.appendChild(d);
        return d;
    })();
    el.textContent = text;
    el.className = 'notification show ' + (isError ? 'error' : 'success');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

// ===== ВХОД ПВЗ =====
function showPvzLogin() {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal-content">
            <h3>🏢 Вход для ПВЗ</h3>
            <label>Логин</label>
            <input type="text" id="pvzLogin" placeholder="Логин">
            <label>Пароль</label>
            <input type="password" id="pvzPassword" placeholder="Пароль">
            <button class="btn btn-primary" id="pvzLoginBtn">Войти</button>
        </div>
    `;
    document.body.appendChild(modal);
    
    document.getElementById('pvzLoginBtn').onclick = async () => {
        const login = document.getElementById('pvzLogin').value;
        const pass = document.getElementById('pvzPassword').value;
        
        // Ищем ПВЗ в базе
        const snap = await get(ref(db, 'pvz'));
        if (snap.exists()) {
            const data = snap.val();
            for (const key in data) {
                if (data[key].login === login && data[key].password === pass) {
                    // Вход как ПВЗ
                    try {
                        await signInWithEmailAndPassword(auth, 'pvz_' + login + '@market.com', pass);
                        modal.remove();
                        showNotif('✅ Вход выполнен!');
                        return;
                    } catch(e) {
                        // Создаём пользователя для ПВЗ
                        const cred = await createUserWithEmailAndPassword(auth, 'pvz_' + login + '@market.com', pass);
                        await set(ref(db, 'users/' + cred.user.uid), { role: 'pvz', name: 'ПВЗ ' + login });
                        modal.remove();
                        showNotif('✅ Вход выполнен!');
                        return;
                    }
                }
            }
        }
        showNotif('❌ Неверный логин или пароль!', true);
    };
}

// ===== СКАНИРОВАНИЕ QR =====
document.getElementById('scanBtn').onclick = () => {
    document.getElementById('qrFileInput').click();
};

document.getElementById('qrFileInput').onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    // Читаем QR-код из изображения
    const imageUrl = URL.createObjectURL(file);
    const img = new Image();
    img.onload = async function() {
        // Используем jsQR для декодирования
        try {
            // Создаём canvas
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            // Декодируем QR (здесь используем упрощённый подход)
            // Для полной версии нужно подключить jsQR библиотеку
            // Пока используем ручной ввод
            const result = prompt('Введите данные из QR-кода (или вставьте текст):');
            if (result) {
                processQRData(result);
            }
        } catch(error) {
            showNotif('❌ Ошибка чтения QR', true);
        }
    };
    img.src = imageUrl;
};

// ===== ОБРАБОТКА QR =====
function processQRData(qrText) {
    try {
        const data = JSON.parse(qrText);
        const orderId = data.orderId;
        
        const order = allOrders.find(o => o.id === orderId);
        if (!order) {
            showNotif('❌ Заказ не найден!', true);
            return;
        }
        
        if (order.status === 'received') {
            showNotif('ℹ️ Заказ уже получен!');
            return;
        }
        
        // Показываем информацию о заказе
        const resultDiv = document.getElementById('scanResult');
        resultDiv.innerHTML = `
            <div style="background:#f8fafc;padding:20px;border-radius:16px;border:2px solid #22c55e;text-align:left;">
                <h3>✅ Заказ найден!</h3>
                <p><strong>Клиент:</strong> ${order.userName || 'Клиент'}</p>
                <p><strong>Товаров:</strong> ${order.items ? order.items.length : 0}</p>
                <p><strong>Итого:</strong> ${order.total || 0} ₽</p>
                <div style="margin-top:8px;">
                    ${order.items ? order.items.map(i => `<div>• ${i.name} - ${i.price} ₽</div>`).join('') : ''}
                </div>
                <button class="btn btn-success" id="confirmReceiveBtn" style="margin-top:12px;">✅ Выдать заказ</button>
            </div>
        `;
        
        document.getElementById('confirmReceiveBtn').onclick = async () => {
            await update(ref(db, 'orders/' + orderId), { status: 'received' });
            showNotif('✅ Заказ выдан клиенту!');
            resultDiv.innerHTML = '<div style="padding:20px;background:#dcfce7;border-radius:16px;color:#166534;font-weight:600;">✅ Заказ выдан!</div>';
        };
        
        showNotif('✅ QR-код распознан!');
    } catch(e) {
        showNotif('❌ Неверный QR-код!', true);
    }
}

// ===== ЗАГРУЗКА ЗАКАЗОВ =====
function loadOrders() {
    const ordersRef = ref(db, 'orders');
    onValue(ordersRef, (snap) => {
        allOrders = [];
        if (snap.exists()) {
            const data = snap.val();
            for (const key in data) {
                allOrders.push({ id: key, ...data[key] });
            }
        }
        renderOrders();
    });
}

// ===== РЕНДЕР ЗАКАЗОВ =====
function renderOrders() {
    const container = document.getElementById('ordersList');
    if (allOrders.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:40px;">Нет заказов</p>';
        return;
    }
    let html = '';
    allOrders.forEach(o => {
        const statusText = o.status === 'received' ? '✅ Получен' : '⏳ Ожидает выдачи';
        html += `
            <div class="order-card">
                <div class="order-header">
                    <span>Заказ #${o.id?.slice(0,6) || '...'}</span>
                    <span class="status ${o.status}">${statusText}</span>
                </div>
                <div>Клиент: ${o.userName || 'Клиент'}</div>
                <div>${o.items ? o.items.map(i => `${i.name} (${i.price} ₽)`).join(', ') : ''}</div>
                <div style="font-weight:700;">Итого: ${o.total} ₽</div>
                <div style="font-size:0.75rem;color:#94a3b8;">${new Date(o.createdAt).toLocaleString()}</div>
                ${o.status !== 'received' ? `<button class="btn btn-success" data-id="${o.id}" style="margin-top:4px;">✅ Выдать</button>` : ''}
            </div>
        `;
    });
    container.innerHTML = html;
    
    container.querySelectorAll('[data-id]').forEach(btn => {
        btn.onclick = async () => {
            const id = btn.dataset.id;
            await update(ref(db, 'orders/' + id), { status: 'received' });
            showNotif('✅ Заказ выдан!');
        };
    });
}

// ===== ВЫХОД =====
document.getElementById('logoutBtn').onclick = () => {
    signOut(auth);
    showNotif('✅ Выход выполнен');
};

// ===== ПРОВЕРКА АВТОРИЗАЦИИ =====
onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUser = user;
        const snap = await get(ref(db, 'users/' + user.uid));
        if (snap.exists() && snap.val().role === 'pvz') {
            document.getElementById('userBadge').textContent = '🏢 ' + (snap.val().name || 'ПВЗ');
        } else {
            // Если не ПВЗ, разлогиниваем
            signOut(auth);
        }
    } else {
        showPvzLogin();
    }
});

// ===== ВКЛАДКИ =====
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = function() {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('tab-' + this.dataset.tab).classList.add('active');
    };
});

// ===== ЗАПУСК =====
loadOrders();
</script>
</body>
</html>
