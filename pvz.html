<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПВЗ | Сканер QR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-warehouse"></i> ПВЗ</h1>
        <div class="header-right">
            <span class="user-badge" id="userBadge">🏢 ПВЗ</span>
            <button class="btn btn-outline" id="logoutBtn">Выйти</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="scan">📷 Сканер QR</button>
        <button class="tab-btn" data-tab="orders">📋 Заказы</button>
    </div>

    <div class="tab-content active" id="tab-scan">
        <div style="text-align:center;padding:30px;">
            <h2>📷 Сканируйте QR-код клиента</h2>
            <p style="color:#64748b;margin-bottom:20px;">Наведите камеру на QR-код или загрузите изображение</p>
            <div id="scanArea" style="border:2px dashed #cbd5e1;border-radius:16px;padding:40px;max-width:400px;margin:0 auto;">
                <i class="fas fa-qrcode" style="font-size:4rem;color:#94a3b8;"></i>
                <p style="margin-top:10px;">Загрузите изображение с QR-кодом</p>
                <input type="file" id="qrFileInput" accept="image/*">
                <div id="qrResult" style="margin-top:20px;"></div>
            </div>
            <div id="scanResult" style="margin-top:20px;"></div>
        </div>
    </div>

    <div class="tab-content" id="tab-orders">
        <div id="ordersList"></div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    }
}
</script>

<script type="module">
import { initializeApp } from "firebase/app";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "firebase/auth";
import { getDatabase, ref, get, update, onValue } from "firebase/database";

const firebaseConfig = {
    apiKey: "AIzaSyBfoIEyhvlUfIgAvXJwOthT6uzfB4gV0Uo",
    authDomain: "electronic-journal-5dff1.firebaseapp.com",
    databaseURL: "https://electronic-journal-5dff1-default-rtdb.firebaseio.com",
    projectId: "electronic-journal-5dff1",
    storageBucket: "electronic-journal-5dff1.firebasestorage.app",
    messagingSenderId: "293962922085",
    appId: "1:293962922085:web:391c3e453bb2725e392e8c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let allOrders = [];

function showNotif(text, isError = false) {
    const el = document.getElementById('notif') || (() => {
        const d = document.createElement('div');
        d.id = 'notif';
        d.className = 'notification';
        document.body.appendChild(d);
        return d;
    })();
    el.textContent = text;
    el.className = 'notification show ' + (isError ? 'error' : 'success');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

function showPvzLogin() {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal-content">
            <h3>🏢 Вход для ПВЗ</h3>
            <label>Логин</label>
            <input type="text" id="pvzLogin" placeholder="Логин">
            <label>Пароль</label>
            <input type="password" id="pvzPassword" placeholder="Пароль">
            <button class="btn btn-primary" id="pvzLoginBtn">Войти</button>
        </div>
    `;
    document.body.appendChild(modal);
    
    document.getElementById('pvzLoginBtn').onclick = async () => {
        const login = document.getElementById('pvzLogin').value;
        const pass = document.getElementById('pvzPassword').value;
        const snap = await get(ref(db, 'pvz'));
        if (snap.exists()) {
            const data = snap.val();
            for (const key in data) {
                if (data[key].login === login && data[key].password === pass) {
                    try {
                        await signInWithEmailAndPassword(auth, 'pvz_' + login + '@market.com', pass);
                        modal.remove();
                        showNotif('✅ Вход выполнен!');
                        return;
                    } catch(e) {
                        const cred = await createUserWithEmailAndPassword(auth, 'pvz_' + login + '@market.com', pass);
                        await set(ref(db, 'users/' + cred.user.uid), { role: 'pvz', name: 'ПВЗ ' + login });
                        modal.remove();
                        showNotif('✅ Вход выполнен!');
                        return;
                    }
                }
            }
        }
        showNotif('❌ Неверный логин или пароль!', true);
    };
}

document.getElementById('qrFileInput').onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async function(event) {
        try {
            const text = event.target.result;
            // Пытаемся распарсить как JSON
            const data = JSON.parse(text);
            processQRData(data);
        } catch(e) {
            // Если не JSON, пробуем как текст
            try {
                const data = JSON.parse(prompt('Введите данные из QR-кода:'));
                if (data) processQRData(data);
            } catch(e2) {
                showNotif('❌ Не удалось распознать QR-код!', true);
            }
        }
    };
    reader.readAsText(file);
};

function processQRData(data) {
    const orderId = data.orderId;
    const order = allOrders.find(o => o.id === orderId);
    if (!order) {
        showNotif('❌ Заказ не найден!', true);
        return;
    }
    if (order.status === 'received') {
        showNotif('ℹ️ Заказ уже получен!');
        return;
    }
    const resultDiv = document.getElementById('scanResult');
    resultDiv.innerHTML = `
        <div style="background:#f8fafc;padding:20px;border-radius:16px;border:2px solid #22c55e;text-align:left;">
            <h3>✅ Заказ найден!</h3>
            <p><strong>Клиент:</strong> ${order.userName || 'Клиент'}</p>
            <p><strong>Товаров:</strong> ${order.items ? order.items.length : 0}</p>
            <p><strong>Итого:</strong> ${order.total || 0} ₽</p>
            <div style="margin-top:8px;">
                ${order.items ? order.items.map(i => `<div>• ${i.name} - ${i.price} ₽</div>`).join('') : ''}
            </div>
            <button class="btn btn-success" id="confirmReceiveBtn">✅ Выдать заказ</button>
        </div>
    `;
    document.getElementById('confirmReceiveBtn').onclick = async () => {
        await update(ref(db, 'orders/' + orderId), { status: 'received' });
        showNotif('✅ Заказ выдан клиенту!');
        resultDiv.innerHTML = '<div style="padding:20px;background:#dcfce7;border-radius:16px;color:#166534;font-weight:600;">✅ Заказ выдан!</div>';
    };
    showNotif('✅ QR-код распознан!');
}

function renderOrders() {
    const container = document.getElementById('ordersList');
    if (allOrders.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:40px;">Нет заказов</p>';
        return;
    }
    let html = '';
    allOrders.forEach(o => {
        const statusText = o.status === 'received' ? '✅ Получен' : '⏳ Ожидает выдачи';
        html += `
            <div class="order-card">
                <div class="order-header">
                    <span>Заказ #${o.id?.slice(0,6) || '...'}</span>
                    <span class="status ${o.status}">${statusText}</span>
                </div>
                <div>Клиент: ${o.userName || 'Клиент'}</div>
                <div>${o.items ? o.items.map(i => `${i.name} (${i.price} ₽)`).join(', ') : ''}</div>
                <div style="font-weight:700;">Итого: ${o.total} ₽</div>
                <div style="font-size:0.75rem;color:#94a3b8;">${new Date(o.createdAt).toLocaleString()}</div>
                ${o.status !== 'received' ? `<button class="btn btn-success" data-id="${o.id}">✅ Выдать</button>` : ''}
            </div>
        `;
    });
    container.innerHTML = html;
    container.querySelectorAll('[data-id]').forEach(btn => {
        btn.onclick = async () => {
            await update(ref(db, 'orders/' + btn.dataset.id), { status: 'received' });
            showNotif('✅ Заказ выдан!');
        };
    });
}

document.getElementById('logoutBtn').onclick = () => {
    signOut(auth);
    showNotif('✅ Выход выполнен');
};

onAuthStateChanged(auth, async (user) => {
    if (user) {
        const snap = await get(ref(db, 'users/' + user.uid));
        if (snap.exists() && snap.val().role === 'pvz') {
            document.getElementById('userBadge').textContent = '🏢 ' + (snap.val().name || 'ПВЗ');
        } else {
            signOut(auth);
            showPvzLogin();
        }
    } else {
        showPvzLogin();
    }
});

document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = function() {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('tab-' + this.dataset.tab).classList.add('active');
    };
});

onValue(ref(db, 'orders'), (snap) => {
    allOrders = [];
    if (snap.exists()) {
        const data = snap.val();
        for (const key in data) allOrders.push({ id: key, ...data[key] });
    }
    renderOrders();
});
</script>
</body>
</html>
