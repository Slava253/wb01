<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Маркетплейс | Продавец</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-tag"></i> Панель продавца</h1>
        <div class="header-right">
            <span class="user-badge" id="userBadge">👤 Продавец</span>
            <button class="btn btn-outline" id="logoutBtn">Выйти</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="add">➕ Добавить товар</button>
        <button class="tab-btn" data-tab="myproducts">📦 Мои товары</button>
        <button class="tab-btn" data-tab="catalog">📋 Все товары</button>
    </div>

    <div class="tab-content active" id="tab-add">
        <div class="add-product-form">
            <h3>📤 Выложить товар</h3>
            <div class="row">
                <input type="text" id="prodName" placeholder="Название товара">
                <input type="number" id="prodPrice" placeholder="Цена (₽)">
            </div>
            <textarea id="prodDesc" placeholder="Описание товара..."></textarea>
            <button class="btn btn-success" id="addProductBtn">📤 Выложить товар</button>
        </div>
    </div>

    <div class="tab-content" id="tab-myproducts">
        <div id="myProductsGrid" class="product-grid"></div>
    </div>

    <div class="tab-content" id="tab-catalog">
        <div id="catalogGrid" class="product-grid"></div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    }
}
</script>

<script type="module">
import { initializeApp } from "firebase/app";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "firebase/auth";
import { getDatabase, ref, set, get, child, push, onValue, remove } from "firebase/database";

const firebaseConfig = {
    apiKey: "AIzaSyBfoIEyhvlUfIgAvXJwOthT6uzfB4gV0Uo",
    authDomain: "electronic-journal-5dff1.firebaseapp.com",
    databaseURL: "https://electronic-journal-5dff1-default-rtdb.firebaseio.com",
    projectId: "electronic-journal-5dff1",
    storageBucket: "electronic-journal-5dff1.firebasestorage.app",
    messagingSenderId: "293962922085",
    appId: "1:293962922085:web:391c3e453bb2725e392e8c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentUser = null;
let currentUserData = null;
let allProducts = [];

function showNotif(text, isError = false) {
    const el = document.getElementById('notif') || (() => {
        const d = document.createElement('div');
        d.id = 'notif';
        d.className = 'notification';
        document.body.appendChild(d);
        return d;
    })();
    el.textContent = text;
    el.className = 'notification show ' + (isError ? 'error' : 'success');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

function renderCatalog() {
    const grid = document.getElementById('catalogGrid');
    grid.innerHTML = '';
    if (allProducts.length === 0) {
        grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#94a3b8;padding:40px;">Нет товаров</p>';
        return;
    }
    allProducts.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
            <div class="name">${p.name}</div>
            <div class="price">${p.price} ₽</div>
            <div class="seller">👤 ${p.sellerName || 'Продавец'}</div>
            <div style="font-size:0.85rem;color:#475569;">${p.desc || ''}</div>
        `;
        grid.appendChild(card);
    });
}

function renderMyProducts() {
    const grid = document.getElementById('myProductsGrid');
    grid.innerHTML = '';
    if (!currentUser) {
        grid.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:40px;">Войдите чтобы видеть свои товары</p>';
        return;
    }
    const myProducts = allProducts.filter(p => p.sellerId === currentUser.uid);
    if (myProducts.length === 0) {
        grid.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:40px;">У вас нет товаров</p>';
        return;
    }
    myProducts.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
            <div class="name">${p.name}</div>
            <div class="price">${p.price} ₽</div>
            <div style="font-size:0.85rem;color:#475569;">${p.desc || ''}</div>
            <button class="btn btn-danger" data-id="${p.id}" style="margin-top:4px;">🗑 Удалить</button>
        `;
        card.querySelector('.btn').onclick = () => {
            if (confirm('Удалить товар?')) {
                remove(ref(db, 'products/' + p.id));
                showNotif('✅ Товар удалён');
            }
        };
        grid.appendChild(card);
    });
}

document.getElementById('addProductBtn').onclick = async () => {
    if (!currentUser) {
        showAuthModal('seller');
        return;
    }
    const name = document.getElementById('prodName').value.trim();
    const price = document.getElementById('prodPrice').value.trim();
    const desc = document.getElementById('prodDesc').value.trim();
    if (!name || !price) {
        showNotif('❌ Заполните название и цену!', true);
        return;
    }
    const newProduct = {
        name,
        price,
        desc: desc || '',
        sellerId: currentUser.uid,
        sellerName: currentUserData?.name || 'Продавец',
        createdAt: Date.now()
    };
    const newRef = push(ref(db, 'products'));
    await set(newRef, newProduct);
    showNotif('✅ Товар выложен!');
    document.getElementById('prodName').value = '';
    document.getElementById('prodPrice').value = '';
    document.getElementById('prodDesc').value = '';
    renderMyProducts();
};

function showAuthModal(role = 'seller') {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal-content">
            <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button>
            <h3>🔐 Вход для продавца</h3>
            <label>Email</label>
            <input type="email" id="authEmail" placeholder="email@example.com">
            <label>Пароль</label>
            <input type="password" id="authPassword" placeholder="Пароль">
            <label>Имя магазина</label>
            <input type="text" id="authName" placeholder="Название магазина">
            <button class="btn btn-primary" id="authLoginBtn">Войти</button>
            <button class="btn btn-success" id="authRegisterBtn">Зарегистрироваться</button>
        </div>
    `;
    document.body.appendChild(modal);
    
    document.getElementById('authLoginBtn').onclick = async () => {
        const email = document.getElementById('authEmail').value;
        const pass = document.getElementById('authPassword').value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            modal.remove();
            showNotif('✅ Вход выполнен!');
        } catch(e) {
            showNotif('❌ ' + e.message, true);
        }
    };
    
    document.getElementById('authRegisterBtn').onclick = async () => {
        const email = document.getElementById('authEmail').value;
        const pass = document.getElementById('authPassword').value;
        const name = document.getElementById('authName').value || 'Продавец';
        try {
            const cred = await createUserWithEmailAndPassword(auth, email, pass);
            await set(ref(db, 'users/' + cred.user.uid), { role: role, name: name });
            modal.remove();
            showNotif('✅ Регистрация успешна!');
        } catch(e) {
            showNotif('❌ ' + e.message, true);
        }
    };
}

document.getElementById('logoutBtn').onclick = () => {
    signOut(auth);
    showNotif('✅ Выход выполнен');
};

onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUser = user;
        const snap = await get(ref(db, 'users/' + user.uid));
        if (snap.exists() && snap.val().role === 'seller') {
            currentUserData = snap.val();
            document.getElementById('userBadge').textContent = '👤 ' + (currentUserData.name || 'Продавец');
        } else {
            signOut(auth);
            showAuthModal('seller');
        }
    } else {
        showAuthModal('seller');
    }
    renderMyProducts();
});

document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = function() {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('tab-' + this.dataset.tab).classList.add('active');
        if (this.dataset.tab === 'myproducts') renderMyProducts();
        if (this.dataset.tab === 'catalog') renderCatalog();
    };
});

onValue(ref(db, 'products'), (snap) => {
    allProducts = [];
    if (snap.exists()) {
        const data = snap.val();
        for (const key in data) allProducts.push({ id: key, ...data[key] });
    }
    renderCatalog();
    renderMyProducts();
});
</script>
</body>
</html>
