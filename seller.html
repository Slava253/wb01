<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Маркетплейс | Продавец</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-tag"></i> Панель продавца</h1>
        <div class="header-right">
            <span class="user-badge" id="userBadge">👤 Продавец</span>
            <button class="btn btn-outline" id="logoutBtn">Выйти</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="add">➕ Добавить товар</button>
        <button class="tab-btn" data-tab="myproducts">📦 Мои товары</button>
        <button class="tab-btn" data-tab="catalog">📋 Все товары</button>
    </div>

    <div class="tab-content active" id="tab-add">
        <div class="add-product-form">
            <h3>📤 Выложить товар</h3>
            <div class="row">
                <input type="text" id="prodName" placeholder="Название товара">
                <input type="number" id="prodPrice" placeholder="Цена (₽)">
            </div>
            <textarea id="prodDesc" placeholder="Описание товара..."></textarea>
            <button class="btn btn-success" id="addProductBtn">📤 Выложить товар</button>
        </div>
    </div>

    <div class="tab-content" id="tab-myproducts"><div id="myProductsGrid" class="product-grid"></div></div>
    <div class="tab-content" id="tab-catalog"><div id="catalogGrid" class="product-grid"></div></div>
</div>

<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    }
}
</script>

<script type="module">
import { initializeApp } from "firebase/app";
import { getAuth, signOut, onAuthStateChanged } from "firebase/auth";
import { getDatabase, ref, get } from "firebase/database";
import { firebaseConfig } from "./js/firebase-config.js";
import { showNotif } from "./js/auth.js";
import { getProducts, addProduct, deleteProduct, getSellerProducts } from "./js/products.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentUser = null;
let currentUserData = null;
let allProducts = [];
let myProducts = [];

// ===== РЕНДЕР =====
function renderCatalog() {
    const grid = document.getElementById('catalogGrid');
    grid.innerHTML = '';
    if (allProducts.length === 0) {
        grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#94a3b8;padding:40px;">Нет товаров</p>';
        return;
    }
    allProducts.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
            <div class="name">${p.name}</div>
            <div class="price">${p.price} ₽</div>
            <div class="seller">👤 ${p.sellerName || 'Продавец'}</div>
            <div style="font-size:0.85rem;color:#475569;">${p.desc || ''}</div>
        `;
        grid.appendChild(card);
    });
}

function renderMyProducts() {
    const grid = document.getElementById('myProductsGrid');
    grid.innerHTML = '';
    if (!currentUser) {
        grid.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:40px;">Войдите чтобы видеть свои товары</p>';
        return;
    }
    const myProducts = allProducts.filter(p => p.sellerId === currentUser.uid);
    if (myProducts.length === 0) {
        grid.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:40px;">У вас нет товаров</p>';
        return;
    }
    myProducts.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
            <div class="name">${p.name}</div>
            <div class="price">${p.price} ₽</div>
            <div style="font-size:0.85rem;color:#475569;">${p.desc || ''}</div>
            <button class="btn btn-danger" data-id="${p.id}" style="margin-top:4px;">🗑 Удалить</button>
        `;
        card.querySelector('.btn').onclick = async () => {
            if (confirm('Удалить товар?')) {
                const result = await deleteProduct(p.id);
                if (result.success) { showNotif('✅ Товар удалён'); } else { showNotif('❌ ' + result.error, true); }
            }
        };
        grid.appendChild(card);
    });
}

// ===== ДОБАВЛЕНИЕ ТОВАРА =====
document.getElementById('addProductBtn').onclick = async () => {
    if (!currentUser) { showNotif('❌ Войдите в аккаунт!', true); return; }
    const name = document.getElementById('prodName').value.trim();
    const price = document.getElementById('prodPrice').value.trim();
    const desc = document.getElementById('prodDesc').value.trim();
    if (!name || !price) { showNotif('❌ Заполните название и цену!', true); return; }
    const result = await addProduct(name, price, desc, currentUser.uid, currentUserData?.name || 'Продавец');
    if (result.success) {
        showNotif('✅ Товар выложен!');
        document.getElementById('prodName').value = '';
        document.getElementById('prodPrice').value = '';
        document.getElementById('prodDesc').value = '';
    } else {
        showNotif('❌ ' + result.error, true);
    }
};

// ===== ВЫХОД =====
document.getElementById('logoutBtn').onclick = async () => {
    await signOut(auth);
    window.location.href = 'vxod.html';
};

// ===== ПРОВЕРКА АВТОРИЗАЦИИ =====
onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUser = user;
        const snap = await get(ref(db, 'users/' + user.uid));
        if (snap.exists() && snap.val().role === 'seller') {
            currentUserData = snap.val();
            document.getElementById('userBadge').textContent = '👤 ' + (currentUserData.name || 'Продавец');
        } else {
            window.location.href = 'vxod.html';
        }
    } else {
        window.location.href = 'vxod.html';
    }
});

// ===== ЗАГРУЗКА =====
getProducts((products) => { allProducts = products; renderCatalog(); renderMyProducts(); });

// ===== ВКЛАДКИ =====
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = function() {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('tab-' + this.dataset.tab).classList.add('active');
        if (this.dataset.tab === 'myproducts') renderMyProducts();
        if (this.dataset.tab === 'catalog') renderCatalog();
    };
});
</script>
</body>
</html>
